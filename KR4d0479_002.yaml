body:
  text: 辨山小隱吟録卷二元黃玠撰七言歌行雜體送仲珍弟還鄉兼奉內弟陳子傳吳淞江邊秋氷生榜人刺篙歌采菱古來貧賤别更苦置酒不飲心如酲落日長雲下平楚孤鴈決起南飛翎救寒幾日衣上禇原頭西風吹脊令阿㜷倚門瘦骨立手揮五弦多苦聲流光一瞬二十載風纚露沐將焉成汝歸買田嵩水曲小築便可開柴扄他年棗下實纂纂我亦豈憚為耕氓芋魁作羹飯瓜麮充腹不在羅珍盛金石論交有銷泐人生急難如弟兄鴛鴦湖上曲妾本鴛鴦湖上女能彈琵琶作鶯語與郎相見得郎歡床頭黃金用如土黃金用盡遂不歸妾身憔悴將何依可憐徘徊花上月為郎沽酒典春衣春衣典却妾無怨後夜花開無可典寄謝悠悠世上兒人生雖樂有貧時忠奴李善歌古有富者家暴亡衆奴同謀殺其孤一奴匿之負以走財實纍爾兒何辜孲􅀈雖小是奴主簿書不敢欺豪銖哺之朝夕乳湩流不忍去手聲呱呱置兒床上拜床下奴以死奉甘勞劬天聽不逺事竟白天子有命行賞誅一奴寵榮衆奴戮却從主人歸故廬雙乘青驄御史馬猶執舊禮謙若虛寄謝悠悠天下士未可容易輕人奴風涇之東有鸛鳥作巢白蓮寺其雄為人所執衆鸛挾他雄偶其雌弗從破巢啄鷇而去市人憐之為求故雄使復合梁邦彥作義鸛行余和之有鳥有鳥亡其儔其雌栖栖方獨憂不知何處來野雄逺挾衆勢剛相求彼雌決決不可強巢鷇覆敗無一留市人聞之共悽惻為求故雄使相收歸來哀呌聲欲死天地有情當淚流物有定偶性則然此鳥何必非雎鳩重為周南歌窈窕人道凋弊有是不哲婦歎人家生女不必能哲婦多事醜婦貞美笑已足傾人城况復恨怒生五兵陽德不競隂始凝履霜之漸為堅氷天下男子唯劉伶彼形甚醉心獨醒婦言雖善亦不聽兒曾舉酒為余壽仌以喜之我生之初日龍􅔀我生之後在鶉咮大郎善事心弗渝為爺舉酒稱翁壽翁顔有喜兒亦歡花插雙髦舞斑袖六彛共是宗廟器寧我此郎非虎蜼百年門户喬木殘本根正賴枝葉茂我今得爾我心安願爾有兒昌爾後結交行結交不必問古今今人非無古人心古人之心淡如水今人之心甘如醴淡言如水味乃真甘言如醴能醉人食淡不如食甘易所以醒人少於醉馬頭者故貴人家侍兒流落錢塘謝長深有詩余和之謝君馬頭歌老孀彼神司蠶宿在房合精月駟耀吐芒衣被天下為文章豈有所思下土方學施朱鉛試新粧黃金約腕珠作璫步搖之冠雲錦裳涼州蒲桃紫雪漿華堂燕坐飛瓊觴人生富貴豈有常朝為名花侍侯王暮為小草委路旁皺面如靴不復光空懸泉刀金錯囊却思故步心自傷星宮之樂樂無央玉泉元帥示余佩刀回回氏所作也如鴈翎而雪色文理可觀將軍太平得寶刀愛之不殊古孟勞三尺白鷴尾雪色引緱脫室風騷騷摩挲秋水生淨滑俊采猶作花門驕盤根錯節知利器名世何必皆豪曹萬辟千灌竒乃見龜文縵理纖如毛當時已用兔膽鐵此物或取羊頭銷傳家要是公輔器苟非其人誰得操藏鋒不試蓋有待幸勿容易汙腥臊竹齋學士作柏圖得之李好古野齋平章舊物也薊丘學士神仙人詞翰揮毫有餘力清風披腹盡琅玕日費尚方三斗墨昔年乘傳向蠻邦修竹如雲楚山夕却回官舸過湘中江雨椎篷寫寒碧逺勢聯翩數十枚顚倒縱橫鳳鸞翼天機到處物變盡雲影紛紛灑人黑想見走筆如飛龍山木水蘿俱辟易不辭遺迹購千金此卷于今妙無敵韓伯清所藏子昻雙松便面并刀剪水一尺餘照見亭亭兩松影玉堂學士自寫真令我悽然發深省聳壑昻霄五十年健筆如錐有鋒頴蒼髯磔怒知誰嗔老節猶將見竒挺直幹斜分水墨痕樛枝亂結風霜頂龍鸞已化毛骨殘雷雨欲來崖谷暝兔絲懸蔓待茯苓回首餘光惜俄頃會稽公子多苦心收拾新詩題小景澱山湖阻風吳兒牽舟背如弓跬步咫尺登天同四方有路無不通我獨何為來向東舉杯釃酒慰柁工解后勿謂吾道窮改方易向矢弗庸明發風止去必從終我不作阮嗣宗時雨既洽園蔬並茂白日有淹雲萋萋篖花亂墜眼欲迷鳴鳩脫袴土作泥園蔬繞舍水出畦王瓜引蔓上落藜瓠葉幡幡生瓠犀菘甲怒長如蘭荑中厨少婦喚阿稽亟取大甕淹為韲魚兔不獲何筌蹄晚食足慰癡兒啼高伯雨苕溪漁隱歌吾聞天目山中乃有千尺之懸泉下赴大谷為奔川百里清苕淨如練雲光鳥影濯濯涵漪漣峯巒過盡見城郭春申劒履三千客當時歌扇吹香拂舞茵此夜啼螿寒月白何如鴨觜灘頭結屋三兩椽苕花開時魚滿船攜書一卷篷底讀瓊瑰玉佩聲琅然贈縳筆溫生溫生之筆手自縳千金善價何鑿鑿百狐不如得一兔可敵人間萬羊鞹剪剔霜毫取脊尻毛穎有傳非苟作縱橫出入腕若飛健甚鳥騅戰亰索頻年萬里獻玉堂名與歐虞俱烜赫應從馬上問葛強誰重並刀輕魯削題趙仲穆山水圖歌遠山如湧波近山如積石遠近千萬山崢嶸起寒碧赤甲白鹽江影空青天芙蓉五老峯野橋村路獨歸客耳邊倣佛東林鐘滄浪老人唱歌處日暮停篙倚江樹倒桃笠子漁竿頭隔水高樓訪誰去醉歌行千金一笑如花妾顔色如花命如葉千里一日竒骨馬雖有竒骨無竒價明月不解長嬋姢浮雲欻來能蔽天人生富貴矢脫弦放手一失三千年彼造物者豫何言醉歌小海足叩舷刻木吏刻木吏望之如神復如鬼昔日猶多市人兒于今併及良家子刀筆之銛毒於蜂尾惡木成隂徑草風靡誰其使之民俗隳矣衆皆趨之吾道微矣去馬歎玉花鐵四蹄如踣鐵青絲絡頭金觼舌一朝名數在有司官馬人間不得騎負我惠養猶嬰兒朔風蕭梢催上道江北早寒無宿草蒼頭廬兒雙淚垂雕鞍錦韂當屬誰吾聞上廄天馬十二間爾豈不得居其間日食太倉一石粟立仗不受鞭笞辱雖我徒步心亦足秦府舊人歌昔日秦王履帝位府中舊人亦同升一龍五蛇各變化一蛇失所意不平玄齡善謀晦善斷勇如褒鄂衛與英鼠輩乃賣我我豈乏爾能相臣為之言天子憐悲不自勝斯人自薄命更欲爭天之功為已榮賜官三品命始下死骨已冷喚不譍嗟乎哉嗟乎哉幾年人間無客星胡不急去歸農耕龍姿之君好事者焉汝不作嚴子陵無名之名千載名山水小景四幅江有水兮水有波龍魚帖息兮風日美和望青山兮如睂而蛾撫佳木兮以婆娑山出雲兮不為霖雨江有木兮不任􅎝柱朝余東岡兮莫余南浦時乎時兮奈何汝洞庭波兮山崨嶫川可濟兮不可涉木蘭為舟兮桂楫渺余懷兮風一葉山之凹兮水之匯沙稜稜兮石礌礌有媺一人兮如彼蘭茞思之不來兮使我心痗題吳景良荷鍤圖倚氷為山擊石作火人生百年一何瑣瑣有酒輒醉不醉亦可來汝僮奴荷鍤隨我狐虎圖狐假虎威虎為狐使人欲有言恐傷虎意虎實未知狐何足忌使虎知之狐其逝矣送吳季良海運歌神禹作貢書惟揚漢家亦言海陵倉至今嵗入踰百萬連艘巨海飛龍驤長腰細米雲子白䆉稏猶作秋風香上登京庾充玉食不與􅎟稷同槩量延陵季子世不乏被服袴褶躬輸將軍符在佩金睒眻上有霹靂古篆書天章乾坤端倪正離坎北斗却轉天中央吾知貞忠對越肝膽露蹈蹂沆􅐯不翅如康莊平生故人走相送攜手躑躅心飛揚亟呼吳娃度美曲無使别苦愁剛腸燕山之南易水上猶是陶唐帝都古兾方九河故迹無復在但見夾右碣石淪蒼茫天下壯觀有如此大君恩重險可忘廷臣論功上上考釃酒再拜中書堂君不聞木牛流馬﨑嶇出劒閣鳴聲酸嘶棧道長何如雲帆千里百里一瞬息卧看曉日升扶桑稚子子蘭歌弔番禺君也月離于箕風揚沙月離于畢雨滂沱星有好風有好雨嗟爾明月可奈何撫靈均之遺曲發浩浩之長歌豈無椒漿與桂酒庭前草生蕭艾多君不聞稚子子蘭方得意三閭大夫沉汨羅懷王入秦竟作幽憂死不睹鄭袖雙青蛾讀書千載有餘憤恨無匣中龍泉與太阿朝朝暮暮陽臺下江水東流空逝波浴蘭之歌歎往事也浴蘭湯兮沐芳思美人兮沅湘今日兮何日搴蕭艾兮滿堂雲之皋兮夢之渚天沉隂兮又夜雨謂子都兮仳􅀈曰離婁兮矇􅀈珠有纇兮玉有瑕心悅君兮可奈何忠不察兮志不讎終自懟兮沉汨羅遺菰兮投黍靈歌兮鬼舞駕飛軨兮龍蹻倚惆悵兮延佇蛇蟠石歌為濮樂間司令作吾聞萬物之精上浮為列星天星之精墮地或為石異哉此石似蛇蟠其故要非人所測我疑芒碭赤帝子披劍斫地白蛇死老嫗夜哭天不聞羣小連蜷化為此又疑愚公移山時此物欲與山俱飛蒼黃不及蛻皮骨操蛇之神手脫遣年多物變形質在豈有毒心猶未改睨之非蚺亦非巴雪色正類蘄州花徂徠小松葉如髮一龍五蛇相紐結咫尺常疑雷雨來尋常頗耐仌霜冽醉李主人初得之舉杯彈琴詠新詩便能雅拜亦不俗未可遂笑元章癡王維􅀈川劒石葉石林作精舍置之辨山下今為沈玉泉所得醉後求見因賦此有石有石美如鑄拂拭鋒稜氣猶怒何人鼓槖動雷風剝削泥沙山骨露昔年曾看􅀈川圖此物題詩采菱渡桃花源裏有人家杏樹壇邊見漁父開元宰相太平日愛是園池賞心具銷沉紫氣斗牛間流落東西幾朝暮石林使君先得之萬里相攜若竒遇即今好事屬君家翠竹疏花倚闌處吳鴻無人扈稽死縱是有靈飛不去嗟我安得力士贔屭如庚辰一看公孫大娘渾脫舞與黃南窗陳直卿吳江長橋晚望倚闌楓落吳江暮地坼天傾百川注飛梁千尺虹影垂人生南北多岐路古來吳越爭為家句踐未足輕夫差鳥喙不可同富貴范蠡亦乘浮海槎五湖水落三江口西施却入鴟夷手我有此志非此時且對長橋一杯酒始疑蒼龍蛻脊骨三十六鱗次第脫渴欲飲川川不竭又似明月相離連上弦下弦空影圓行舟如梭月心穿雄藩千翼來飛泛日看水兵教水戰能詩忽憶謝玄暉解道澄江淨如練觀謝莊納租為作此詩是嵗免息者八千餘石穰穰大粒揚明珠舸􅀈塞川銜舳艫積囷如山壓厚地據案一呼走千奴阿戎牙籌盡相學九九之術乃有書孟冬上朔簡良日府檄已報輸公租持杯起為主人壽天實賞爾其如豫願平槩量損稱貸勾稽不足慶有餘郭索行輕舠刺棹漁火紅夜捉明月巨蟹宫有物郭索蛇鱣穴古稱敗榖乃介蟲橫行豈欲遍天下雷公在上聲隆隆爬沙六跪心善躁失腳已墮篝簏中兩螯微生可薦酒空筐寧論蠶績功張翰亟上賀循舟能不為爾思江東蓴菜為羮鱸作鱠風味視此將無同須尋玄真蟹舍子更續蟹志如龜蒙顧梅西東吳小隱昔日東吳顧文學族大今為磐石宗林下幽居得隱者小營齋廬無十弓會稽竹箭美如玉竒才更出菰蘆中卓然學道見真性氣貌穆若揚清風園有佳蔬勝食肉春初早韭秋晚菘蓴菜何慚八珍味橘樹亦疏千户封靜觀物化那有極虎可為鼠蛇可龍大癡小黠競相逐胡不遠視要其終仲珍弟阻冰謝莊河水夜合凍冷生行人欲往急打冰冰堅如石不可動威稜嶄露聲硜硜船頭黃帽且勿怒速來吹火煨餘罌前川咫尺論萬里念爾翾飛雙脊令後庚三日日在癸水德不競木始萌當有好風自東來一夕為我誠上人道元樹石江風吹樹葉盡脫交枝相纒亂如結筯節刻露夔一足霜雪幾年凍不折昨夜沙頭秋水生怒湍觸石與棖爭恐為浮槎逐海客不見土羊成木精衍師道原雙松圖小石如拳大如癭石上亭亭松樹並誰從山隂得繭紙幻藥毫端寫雙影風雷太古見植立冰雪平生慣凄冷下有茯苓千歲根可為人間駐流景次韻戴彥叔見寄人間製錦金粟尺裁量無差較如一文章要是機軸同新巧小竒何足識多君肯説江夏黃剡中戴逵亦少雙兩窮相值各可笑寧爾訾相非竒龎富貴不來良己巳萬事東風吹馬耳賭碁别墅要自佳誰能更為蒼生起無官只作常兒遇布衣不羡流黃案玉樓佳召惜芳年金谷俊遊悲故主夫須小笠烏紗帽城外孤村春水繞碧巖直上八百級半空飛瀑看尤好古來隱者非怪迂每從此地逃侵漁我生百拙兔守株操觚逐食計甚踈豈有大志恢雄圖家無甔石心晏如焦先雅愛蝸牛廬便欲往置燒丹爐桑君之書懸左肘已非昔日攀雲手江南春色苦無多忍見行人折官柳但願飛霜九轉成與君晚歲扶衰朽與大舟並行遇風感興大帆引縆去如飛小帆翳翳行苦遲誰其敢爭風使之少時風休帆力軟原頭樹高桅子短前舟却輸後舟遠吁嗟世事非一端咫尺行路易復難人生得意莫盡歡嵗晚思親寒仌凄然嵗欲徂我獨何為水中居雙目鰥鰥如鑰魚長夜思家夢亦無大人耄矣日幾餘笻竹小杖不肯扶恆恐平地生憂虞願為飛梁跨連湖來往並置捷走奴五日一送甘旨厨十日一報平安書雪中過機山明日寄周彥良彥英兄弟雪飄飄兮灑豫風燮燮兮振衣水㶁㶁兮有聲仌稜稜兮在陂鼓獨枻兮蘭舟日既晏兮莫知所之僮瘁􅂒兮問豫爾所思兮為誰我所思兮非爾所知山中之人兮戴逵嵗周行兮莫只慨星霜兮屢移終過門兮不入曰古昔兮有之送松江楊知府海上有馬獰若獒楊侯得之刲作肴倉中有鼠大如虎楊侯得之刳作脯嗟嗟楊侯孔捷且武濟寬以猛爰得我所風雨息海水寧災􅊣弭年榖登五事並舉政有聲歌謠滿路勞績成連州比邑歷歷相知名父母之心人皆有之公獨能寄張元明時為常州務官踆烏西飛碧雲夕寒蛩亂啼霜月白青山盡處是姑蘇毗陵更在姑蘇北故人一别音問疏兩愁無語心相憶三年市租輸大府能不重費微官力我方寄迹湖泖間終嵗不逢騎馬客昔時梅花今又開時獨看花見顔色新舟燕客行奉似謝德嘉伯昭叔姪上巽下坎木水合大者為艑小為艓衆賓良辰歡賞接琵琶棖棖雷鼓疊急管橫吹指雙擫紅泉美酒傾銀榼鸞刀縷鱠魚藿葉波臣川后風帖帖喜色歡然動睂睫黃帽採菱相唱答重為主人歌利涉玉泉萬户見訪馬上將軍渾脫帽馬前大旗狼尾纛自從蠻洞凱歌回重為兵人息凋耗吾與三代同斯民禮樂百年蒙乳菢久知天族最多竒不似其餘心猛暴虎帳秋來日日間散步逍遙屛呵導時聽白髮老書生一鼓雅琴清角調觀浙省新址錢唐故都猶麗雄民居百萬如蟻封一夕熛怒赤熁空市舍歘忽隨歊風丞相夜下哀瘝恫飛書走檄動帝聰大寬賦入振乏窮乃恢黃堂基益隆斯民子來爭赴功豈弟君子汲黯同吳山蜿蜒若火龍渴欲急水鱗甲紅胡不移置山南東遠挹江上青數峰岡阜回合水朝宗環拱北極當天中余遊暨陽訪道士吳清逸見大龜如車輪五尾色蒼黑類古銅蹣跚而行特特有聲因為之賦惟爾大寶元龜集虛洞玄吐納精氣介蟲之仙衡曵五尾蹣跚而前皮肌鱗鱗支節連蜷若傾耳以屢聽聞足音之跫然不用世以蘄求固有覿於幾先其德孔明其心善淵形質已異而神獨全爾不自衒人其舍旃持以為聖人壽如其年如其年樊中之鸖折其脛而死人莫之恤余獨為辭瘞之使爾為羊人不汝忘使爾為馬人不汝舍孰使爾為鸖其骨犖確食人之食不羊馬是若不安爾處將飛而翀忽焉跌傷乃今畸窮爾鳴孔哀爾心孔棘困于樊中雖死誰惕瘞鸖有冢古人之為神其上升吾與爾銘之紀夢哀容齋陳君也昨夜夢中逢故人華屋涼天正瀟灑銀罌美酒雕玉觴亦有尊前唱歌者餘歡未盡忽驚寤蔌蔌寒花落燈灺忍將今夢夢昔夢夢去愁來淚盈把西園公子多雅懷死骨凄涼在中野當時苦愛椎鑿聲豈思此日無遺瓦古來豐家無好兒荆棘銅駝秋露下草間翁仲不解語焉用鬼騶牽鬼馬余自辛亥歲館于魏塘吳氏時義士靜心先生方無恙長子彥良譍門于家次子景良輸力于時皆一時偉人季子季良為贅壻于外與余尤相友善嵗壬申景良卒于官所歸葬胥山諸孫各求分異學遂廢而余乃去矣頃者不逞之徒壞其守冢之廬季良之子璋聞于官罪人斯得衆稱之曰能故為是詩以勉之天目諸峯來迤邐又向錢唐渡江水伏龍骩骳行地中東盡由拳還崛起想見昔日遭秦驅太古風雷入鞭箠山君據地不肯前至今亂石猶西指下有石龜形質具蹂躪良田捷於鬼伍貟揮劒迹尚存缺齾不完神乃死當時結友番禺君别墅園池此經始朝陽亭上醉春風謝安曾愛東山妓回首光隂二十年往事渾非山尚是歎息佳人曹子丹翁仲無言荆棘裏搖鈴鼓哨旁若無鄉里小兒何敢爾脊令脊令飛且鳴能事多慚伯顒氏憶昔行憶昔俠家全盛日江左數州無亞匹黃金橫帶虎作符盡斥民居為第室長腰細米光照人自給不求歸老秩舂陵石几汝州瓷一席萬錢猶儉率是翁九十乃未殂牙齒重生髮如漆已無餘福在人間此理分明可諳悉健鶻生雛盡攫拏驕馬作駒終覂逸寄謝悠悠世上兒過眼繁華如電失謝氏池上觀雪二月春光如水冷池上倚闌觀雪影飄飄颯颯舞回風顛倒瑶花落天井魚吹柳絮忽銷沉却避寒澌依藻荇何處飛來雙脊令令我悽然起遐省次韻陳縣尹漢卿見寄九華山前江水長平生故人黃綬郎百里猶將勞撫字欲行不行心未忙與君已在杖者列豈憶他時能醉狂恨無長雲數百尺一吐憤思三千行草間雉子毛羽短不擬霄漢參翺翔題詩采石弔李白或者一駕西飛航用水精丸炷火灼丹田中仙人掌上水精丸摘得金莖秋露顆亦同陽燧大蛤珠摩挲向日出真火氷臺作炷丹田宮流光直射如血紅梅花一夜孤根暖却笑小還無近功擬送曹世長之官柳州賭博寨將軍曹霸有令子軀幹魁梧如北人辭親再拜捧黃檄去作柳州遊徼臣櫜鞬已乘官驛馬頓置仍給公厨珍引弓之民百寨列控扼嶠海安朱垠伏波故事亦久矣豈有銅柱猶嶙峋且當永念易播意持酒一酹羅池神孤雲東北望新月山川迢遙來苦辛彈舌風雷語刺刺索笑萬里梅花春桄榔大樹粉作餌椰子酒􅌻甘而醇食膎每與華俗異愼勿觸手腥蛇鱗愛君貌似婁師德故是方口又博脣古稱容容多後福唾面自乾可勿嗔與宇文同知張主簿遊道場山三月三日天氣佳縣官出城早休衙亦有前溪宇文氏水晶宮外看春花碧浪微風動浮玉翡翠蘭苕採柔緑笑指高人讀書處輕舟已到何山麓何山山頭更是山路出千巖杳靄間僧居蜂房開户牖滅沒紫翠飛朱丹川原忽滿最高閣五湖煙雲一憑闌昔年惡虎今在否但見醜石遺蒼頑麗姝來往多如雨紫綾香䙬結金縷佛前細語人不聞倒坐藍輿下山去立春日贈仲珍弟阿父八十兄六十弟亦今年五十五千里一家同得春春日春盤行菜縷汝緣久别奉晨昏我仍漸老懷鄉土常時相念惜相分此日相娛喜相睹勞碌餘生病後身陶寫真情醉中語共將巵酒拜親前嵗嵗親前吾與汝生日戲書天弧之南老星公素髮垂耳冠夫容青鸞引車雙羽童翩何姍姍來御風我生甲子旬再逢顚倒撲漉隨飛蓬磬折而趨跽鞠躬神人妙顔氷雪容遺我松子種作松流肪千年虎珀紅爾能得之壽乃翁韓季博所藏青山白雲圖門外馬蹄三尺塵屋底青山看白雲不知身世在城市但覺􅐩氣吹冠巾鴨觜灘頭沙渚露依約西陵近漁浦惱人歸思滿江東煙樹半沉天欲雨酒歌酒可喜亦可嗔醒語多忌醉語真常恐醉語撑觸人天上星辰何歷歷人間岐路長踆踆既不能揮戈回白日且當拍手歌青春酒固非所嗔本亦非所喜作事不稱情寄懷聊復爾噫吁􅐵牝而黃牡而驪先生既醉不暇知苦如薏澀如杜先生既醉不暇顧頌酒之德讚酒之功偉哉斯人吾其與同熊經鳥申盡無益三杯可使顔再紅歸去來遊醉鄉醉鄉天地猶鴻荒卧看軒轅搖左角手挾北斗㪺天漿令汝壽命百有二十嵗與物無忤永相忘薄薄酒奉别吳季良薄薄酒可杯勺粗粗布宜浣濯醜婦耐貧勤織作我無南陽諸葛田赤手欲探蛟龍淵曲中箜􅔃十四絃河水東流心􅀈然角上蝸牛且酣戰鶴脛自長鳬自短井蛙海鱉相譏嘲何似雕鷃俱逍遙八珍之味不如良友千金之富不如佳兒百年一息萬世癡龎公未為無所遺南山有木木有枝根如盤石不可移薄酒味薄情不薄醜婦貌醜心不醜君不見天下風流朱伯厚車如雞栖馬如狗河西蒲桃紫雪漿秦中琵琶嫵媚娘黃金快意一日樂奄忽百嵗如風狂天雨未休匏葉苦江湖水深不可渡豫章非枕衆莫辨橀榽似檀人伐汝漢隂丈人抱甕歸萬事反覆非一機博勞東去燕西飛毋與寸草爭餘暉題葉仲明府判竹君右丞公第二子也家于富陽虛廊靜院連深竹色照窗扉如水緑題遍琅玕節下詩高興滿懷吟未足儘教梳洗出清風客來徑造亦不俗出門咫尺是塵間野鳥紛紛自相逐過無錫呈五十三舅曉發澄江春水緑刺篙夜下梁溪宿老者今年六十三秀睂霜雪顔如玉大郎挾策青鳥市小郎恂恂侍巾襆就中中郎絶秀殊耽書動是千過讀一門傳恭復傳孝如此窮餓心亦足舅甥情愛久更親竟夕寒燈共華屋喚奴呼酒出羊淹重説生涯亂心曲即事蒼頭小奚得馬芻黃吻稚兒看魚罛白髮老人教農書客來手把河洛書話到混沌開天初日出柳樹東哀劉先生也先生字環翁登進士第授建德録事卒于都下日出柳樹東日沒柳樹西朝朝暮暮出復沒栁葉黃落半為泥鬱華仙人駕六螭急若弩矢誰能齊夸父逐之道暍死跬步萬里生蒺藜千載同一朝白髮如霜荑奈何性命不自理只思騎馬聽朝雞送韓與玉入京求其師張仲舉先生君家兄弟森羣玉數兼八韓仍兩之復有一人更才敏將往京域求其師其師為誰子張氏曲頦美凖秀且頎雞栖昻昂立孤鶴羽翼已遂沖天飛昔年助教國子學橫經氣奪千臯比頃日還當大述作並録三史追前徽使者旁搜異書出天下學士來委蛇春秋用例如用律遊夏猶將贊一辭直書無愧董狐筆上與日月爭光輝子今行矣快先覩涉閲定有新聞知赤華之駒不受鞭顧影獨立長鳴悲經途九軌竒骨見渠忍局促鹽車為祗疑慈母手中線密縫政恐遲遲歸文章有神國有造贈子脫頴雙毛錐好音早寄南來雁無使淄塵汙素衣梅花後夜琴曲苦滿天明月照相思贈製筆沈生月中仙人白公縞衣翩然乘玉虹遺我利器五色光將使奏賦蓬萊宮江淹老去才思劣夜郎歸來亦華髮願乞瑶池不死方須得玄霜和紫雪剝啄叩門秋夢回有客真為黃香來坐中頓見兩毛穎脫帽露頂美且䰄君不聞朔土貴人執笏思對事倉卒墨丸磨盾鼻何曾望見㕙與䨲馬上柳條能作字後來雪菴松雪俱善書始愛都人張生黃鼠鬚安知沈郎晚出筆更好猶及館閣供歐虞拔竒取俊鋒鍔見雙健似生於菟用之不啻仗手檛顚倒縱橫隨所如種德堂詩并序青龍章俊甫取種德二字扁其中堂他日設廣席大會其族人引二子某某遍見之曰賴祖宗之遺衣食幸有餘饒乃者衆建義莊以給宗族吾父與仲父之素志從兄伯吉甫實繼而成之區區之私所以奉尊長及卑幼者嵗有常數不敢以復出而遂廢俟是二兒能自植立户門伏臘之餘凡在席者將他有所資遺富貴無常忽則易人我後子孫有不如今日族之充裕者其勿能有所矜畀之乎噫達哉斯言所謂種德者已推而致之以及於遠譬之種木枝葉必茂雖高其門使容駟馬車可也余往嵗弔其叔父蘭溪大夫之喪吉甫以江淮財賦副總管居憂諸兄弟求分異俊甫調停其間意望有觖每以已分所得彌縫之卒無傷大體是信能輕於財者他有善未能盡知姑録此以示吾兒而為之詩樹木猶為人所愛况爾宗􅉀磐石大條梢之末苟勿殘可使亭亭似車蓋枝葉能承雨露恩乃今流被及本根一門青紫什七八雖貴弗陵尊行尊保家要在全和氣和氣致祥乖氣異雲仍百體同一身恆使勻通有生意富貴浮生何敢期長長幼幼咸在斯肯道吾兒幼衰替煦嫗願如今日為昔之祖者今之禰推爾所愛達爾始如木有根種厥德堯舜之道孝弟而已矣碧瀾侍兒曲并序聞之謝長源吳興趙碧瀾老而貧二妾方少艾慮不能久安遣之曰吾囊篋中物鬻且盡懼及汝也可及此時事人既去弗肯嫁數具肴酒致殷勤於其卒覆諸水曰勿復來余惟割情忍愛以去爾也爾弗我忘祇攪我心既而與其父母俱至泣而言曰我家嵗請給府中所積足贍供養奩籹具在願執事終身為尼以報主恩他日果然碧瀾死有寡女又資育之吁賢矣哉吾舅陳汝泉父妾貝氏守義弗嫁事頗相類既作是詩併以寄外弟子章子經感之以誠感必深應之以真應必捷真誠一合兩弗離聼我長歌碧瀾妾碧瀾亦是諸王孫世殊事異老且貧少陵尚愛燕玉暖况是當時真貴人春衣典盡春寒峭二妾朱顔正姝好忍將羅帶拆同心懊恨浮生頭白早珠鈿翠靨幸僅存此時猶及嫁夫君十二樓頭燕子去揮手不用留仙裙去妾相悲兩相約既去猶煩送肴酌主君詎忍覆棄之見此翻令情緒惡一心專天得知忍著主衣還事誰遂攜衾襆與俱來後君死者當為尼碧瀾堂下雙溪水使客往來豈知此不願新歡戀舊恩千萬人中兩人耳劉子輿清嘯軒大哉扶輿動應有機律呂風雲黃鐘之宮發乎自然為聲氣君其在我人呵噓吸呼節族以分嘯乎嘯乎何濁何清惟心所存力出爾手以擠則危以掖則安氣出爾口以吹則寒以喣則溫民各有趨狂者如籍壯者如琨嗟我懷人憤悶既舒亦已忘言冥玄洞虛不可以名以名斯軒一姓三氏詩并序傳曰因生以賜姓胙之土而命之氏氏者姓之别姓一而氏二者也錢唐陳君子安本姓王氏幼蒙恩養于陳氏姑姑無子請于其父為已子既乃壻于沈氏沈之後又無子身一而已不可以再易氏也子安三子參分之使各從其氏為之後而主其祀焉姓王氏正也姓陳氏恩也姓沈氏時也雖重輕大小之差各殊而亦事之弗得已也上古聖人蓋有同出而異系者堯之姓伊耆高辛氏之子也簡狄為高辛氏世妃祈于郊禖見玄鳥墮卵而生契契之姓子薑嫄亦為高辛氏世妃祈于郊媒見巨人迹履之生棄棄之姓姬是也况王與陳原其所自又皆舜媯姓之别乎是為詩曰彼種樹者更枝易葉以彼成此實相應接載息載滋兩殊一合天時既從物亦允協本本支支紛其叢沓初氣永存至純不雜伯衡北上余在璉市作此詩以送之不及姨氏之子平生親憶昨書來道相别青徐大小郡邑殘却走梁園向京闕五河高原車鬬風魯縞齊紈吹欲裂讀書豈是為一官倒著狐裘擁飛雪重遊都市十年餘須得青袍慰華髮日近蓬萊雲氣佳氷解滹沱水聲活羊酪甘肥馬酒醲土銼無煙石煤熱金錯披囊罄一歡槖筆縢觚待明發便令南斗避文星歸插宮花醉吳月龍頭之西有伏龍山首枕巨海上有古寺雲嵐之氣嘗蒸蒸然如黃梅時唐會昌中詔毁天下僧寺寺僧作詩云雲中有寺不容住天下無家何處歸有旨得不毁癸酉歲余與族叔族弟及戴彥季同遊獲觀先祖遺墨既暮余與族弟先歸山半值大雷雨山上晴朗如故作詩以紀其事云青山如龍行且伏渴欲飲海海不足輕衫短屩小笻枝獨上龍頭叩龍腹龍腹空洞聲豅豅豈有神倉閉神粟棟花風起鯼魚來遠望漁艘似浮鶩痛思我祖伯豐氏遺墨宛然三過讀無食無家走千里尚賴餘休守觚牘瓜瓞子母相鉤帶斷蔓殘根僅能續徘徊瞻眺不勝情貧賤何由復邦族忽從巖半黑雲生歸去驚雷撼崖谷相望咫尺異隂晴衆客山椒我山麓某甫者章氏之庶孽子也所出微不得與衆兄弟齒治田廬供衣食比分財得黃金盤杆一其從父弟俊甫方修青龍鎮學一日持以造之曰我為農無用此吾家二先生死無後願鬻此置祠學宮之側買田收其租入春秋二時用少牢具祀之以徼福于先聖先賢慰吾父與伯父師弟子之心冥冥之中其為我經營之余與聞斯言時至元後癸未嵗也每思其人故作詩以寄之章氏孽子操心危少曰已愛躬藝芓夫耕於前婦後饁飲酒安用黃金巵不向尊前賞歌笑買田獨置先生祠詎忍若敖無噍類工執藝事猶有師昔聞此語心為喜至今思之不能己到處真同説項斯遑恤他人惡聞此當時師説詒李蟠棄置床頭如故紙乃今面目被生憎况肯興懷尊死鬼伯清兄弟在者三人次仲實又次季博有練溪别業連雲莊弗肯分異户門應酬衣食用費賔客燕會嵗一人遞收其田租以掌之為計帳以相交付同堂異室內外無間言于兹有年矣是亦保家之善道也不然則力分而用廣日且不給况能久而弗墜哉是宜詩伯清即韓分石會稽公子誰與儔塤箎並和聲相求户門多事須應酬繭絲榖粟嵗遞收公爾忘私無怨尤娣娣姒姒俱淑柔醪醴潔治蘋藻羞嵗時祭饗禮數優譬如風波同一舟戚則共戚休亦休彼哉何人此弗猶兄弟生分如死讎上健下險森戈矛黃金用盡身為囚令我感歎淚欲流人無遠慮多近憂冬至日大哉元氣何沖融周流六虛相始終為陰為陽本非二政在往來升降中去年陽生隂已極今年陰消陽復息君子有道喜可知手把梅花看三易西郊醉歸似陳漢卿人間此客不可孤况此翕忽嵗欲徂吳姬雙歌送美酒半醉不醉嬌相扶踏歌攜手尋歸路行雲忽送巫山雨却上溪邊􅀈艋舟舞衣濕透黃金縷短棹輕橈不相及依約中流聞笑語歸來庭院已黃昏流水落花深閉門最思一事尤可怪笠子忘却溪南村夢回酒醒不復記清曉野夫來叩閽藏鉤似陳漢卿世故紛集如蝟毛今我不樂年將慆漢家鉤弋作隱戲聊足與客娛佳宵緑酒蕩漾白銀甕紅燭照耀黃金幖明籹列映左右侍大賓坐壓東西曹平生刎頸託交契此日意氣爭分毫老拳攘袂堅莫取鉤神瞪目不敢語搏兔壯士聲若雷失馬將軍面如土忍將他日嚴毅顔涴墨塗鴉上睂宇餘姚吳季章松齋圖四明山中木千章上有松樹生高岡不與朴樕同翳荒雨露飄灑雲之陽鵝溪大絹尺度方寫貌形似分毫芒非龍非螭牙角獰開卷白日風雷生之子秀骨須睂蒼與松為遊三十霜小結茅屋松隂涼采松之花餐松肪彈琴誦詩送流光人生有情苦參商白水滿地天茫茫安得送我置爾旁脫落世故遺紛龎樂與夀命如松長傷春曲鴛鴦湖邊花滿蹊鴛鴦湖外草萋萋春風醉人驕馬嘶玉花連錢錦障泥繡羅為襦金絡緹鮮卑小帶鏤文犀哀哉王孫歸路迷紅娃翠壓愁空閨昔時歌鶯今不啼楊花墮淚章臺西寄李坦之神仙中人不可招薄言思之我心勞霞裾遠曳風飄飄照影獨立江之臯豈無囊中金錯刀安得攜手與遊遨玉雁銀箏紫闕吳娃雙歌送春醪大江東流日滔滔江上春風吹碧桃花飛萬點正魂銷寄錢竹深西方美人隔秋水優曇花開白雲裏白雲無事長悠悠美人不來我心憂金井銀床露如沐玉琴夜罷相思曲麝煤鼠尾生暗香吳箋染恨春波緑織烏西飛何日還赬桐始花亦已殘人生有情歌欲絶明朝覽鏡凋朱顔辛未七月草三日大雨孟秋之月月在畢雨氣斗集雲深黳懸河翻空海水立萬瓦千霤如奔溪向來高原變汙澤巨浪上蹴天為低三吳良田入井底菜茹豈復如畛畦室廬藩溷盡漂沒存者歷落猶雞栖男兒性命不自保往往中路遺嫕㜷書生有情淚沾臆落日黤黯秋雲西梅花菴為吳仲圭作函三一氣初未分包括萬象為陽春亦如孤根抱獨暖不與桃李同光塵吁嗟此意知者少我欲往問菴中人高官不如士白賁厚富不如農赤貧結茅為椒小於笠翕翕鼻觀通機神眼中見花不見我我身己與花為身次韻王達之園池假山并似錢春野海上諸峯皆絶竒其高無顛下無涯一峯飛來在平地小小亦足同幽期近結齋廬處其下十里平川見多稼客來政有酒盈尊我生不作悠悠者突兀眼底多偉觀如虎如貔氣桓桓或窈而深如洞穴或峙而立如岡巒如積錢色萬鈞重如鸞鵠停欲飛動人間此景不可孤風月佳時與君共偎花倚竹相鮮新寒士亦各忘其貧胸中丘壑故不俗元章石交平生親世變紛紛參復伍嵗晚相看吾與汝次韻賈玄英烈女祠祠在嵊縣青楓嶺至元丙子天台王氏婦被掠至此齧指血題詩石上云君王無道妾當災棄女拋男逐馬來夫面不知何日見妾身當是幾時回伺兵士少間投崖下而死女郎號天殺氣黑題詩齧指生血滴天白赤城山為低一擲萬仭驚魂飛將軍詎忍驅迫為夫君不見我心悲國破家亡兩依依人命幾何花脫枝不學明妃辭漢寵猶使胡兒拜青冢流光一去若箭弦安用馬上啼嬋姢語言侏離不可解妾有一身無二天節不可移頭可碎口血未乾身已墜餘生含笑入九泉不向人間偶殊配天地陰陽有消息終始一心如鐵石至今積水閟幽靈嗚咽疑聞髑髏泣海大船太倉龍驤萬斛船欲動不動艇子牽沙江水淺潮易落咫尺見海去莫前艇子勿誇爾能事士生未遇亦如此須臾水深風力強大船却將小艇行采枸杞子作茶餅子流水河邊見碧樹上有萬顆珊瑚珠此疑仙人不死藥黃鵠銜子來方壺露猶未晞手自采和以玉粉溲雲腴卧聽松風響四壁未老更讀千車書穿石松歌為葉秀軒總管作闔閭古城城北東崑山迤邐盤蒼龍天星之精下融結其中有石皆玲瓏山農穿山若鯪鯉雄椎怒擊雷光起木精土性莫敢私蟻垤蜂窠差足擬三吳主人欣得之保抱護惜猶嬰兒剔抉泥沙出竒骨洗濯煙霧生神姿建昌花瓷培宿土徂徠稚松沐新雨却穿月竇出雲凹山鬼髑髏毛髮竪題書寄逺情可知結交嵗晚心勿移一卷自有丘壑意百折不受仌霜欺終朝坐對兀若癡茯苓琥珀生有時苦熱行十日不雨草樹焦一月不雨川源竭酷吏作威何可當大地流熺赤於血嗟我有情空自傷會擒女魃出神潢手挽懸河作甘澍坐使大地生清涼鄒一初提點三清閣傑哉高閣開神區此地何必非玄都天上玉京十二樓飛來人間作畫圖欒櫨交加虎獸伏甍宇軒翥龍鸞舒上方自與三境接星光歷歷種白榆晨朝焚香禮碧落仙風半空聞珮琚此生塵網如可脫願為清歌隨步虛天星湖上歌似吳泰然秀州孤城懸斗口中有湖水藏天星龍飛已去迹猶在靈宮故是白玉京題詩欲寄羡門子問訊或過茅初成交梨火棗如可得與爾相見夫容城鄭彥昭書巢鄭生結屋名書巢豈欲巢居似巢父風南枝北兩相忘焉用繆綢開牖户我聞在昔巢父時大道何曾立言語只從書契造文字後來作者多如雨生今所藏竟何書吾欲滄浪濯纓去儘令無用束高閣坐使民風返淳古濮樂間得唐雷霄琴黃南窗鼓之霹靂晝下乖龍升嶧陽孤桐才具成大唐雷霄與斫削木精咋舌山鬼驚漆光拂拭淨如水蛇跗欲走不得行主人愛琴仍愛客層軒白月秋夜清請君為我儘意彈我亦為君傾耳聽上絃洋洋和且平下絃琅然如叩仌回頭始疑崩石裂泛指忽作蜚鴻輕銅盤亂泣珠琲落鐵撾碎擊珊瑚鳴江山清空草木動律呂應會風雲生揮杯弄影喜欲舞主客爾汝俱忘形人生交契如此酒子期知音復知聲似胡伯可人生百年如置棋東西南北何多岐白雲自是山中物風雨一出歸無期我居鴛湖上子在龍江湄能無咫尺書慰此深相思長干緣河小於帶積水滿地天光垂滄波老樹沉欲沒荒郊冷落如秋時小家流逃大屋走五種不入民情悲思君不見心欲折背人白鷺雙飛飛送任子昭北上江南二月柳如繅欲折未折風騷騷天上神京春色好蘭臺玉堂多俊髦龍江公子少年日乃翁攜之與遊遨翰墨之餘及丹青譬彼魯削非凡刀胡為歷碌風塵下與世俯仰猶桔橰未必屠龍不及豨要是釣魚須釣鰲亟亟上書自薦達一刺民瘼針如毛同深甫萬户前科賞櫻桃將軍黃金作珮符霹靂古篆雕天書上有三明珠卧護千里堅無虞重為王孫開酒壺溪鯽銀絲鱠新魚蓴龜青小滑可呼櫻桃結子紅珊瑚吳姬能歌花不如坐擁翠袖飛瓊觚人生百嵗多歡娛與張叔方去年送君作巡官雙懸雕弧夾馬鞍今年巡官出迎客吠犬不聞山月白山人畏之若乳虎妖狐髑髏不敢舞豚穽雞塒一萬家誰子強梁能跋扈君不見南臺貴臣急如火櫜鞬磬折趨道左州司盡避供給難君獨從容無不可名駒千里毛骨竒雷霆破山亦霽威人生才美有如此豈可沉埋百寮底明朝雕鶚西風起贈飛星學古仙學古仙雙瞳如巖下電矆睒龍光碧花眩亂摘星辰掌上飛驚動當時出奇變扁舟適從何處來湖上鴛鴦乍相見袖間小軸錦作幖欲釣珊瑚入詩卷梅花一笑領略新筆底春回仌雪面脫爾身上六銖衣試我囊中五色線昔如羇鶴在樊籠今似韝鷹解絛鏇刮目他年看阿蒙收拾黃金如土賤去矣行使我飲酒不如長鯨使我食肉不如猛虎昨夜雪深人未歸明日仌開客當去念爾公家急急符白水無邊走何所從聞海上有神仙上界于今亦官府君不見東墅老人粟萬鍾金鑰牙籌棄如土秪有凄涼鬼緑珠怨魂相從泣寒雨贈永上人大休和尚少年日盡遺俗緣甘獨孤人間紛紛臭如帤此身不可一日居黃金裊蹄明月珠美人如花繡襠𥜗收拾衆有歸元無不忍頭顱生髮須即以宅舍為菴廬袈裟折那衣五銖麻鞋蒲龕坐結趺口中波羅天竺書高蹈萬古隘九區繞屋青青種春蔬焉能食肉更食魚優曇花開滿前除空色兩忘心淡如江南稻至元六年四月上海姚勝一等作閧江南稻雪色白可喜去年八月天雨多戢戢禾頭盡生耳里正急公租飢人若羸鬼海獠大無知毒螫肆蛇虺軍府上變羽檄飛白日森然五兵起鼓鉦動地火赩天性命鴻毛同一燬古者反側加天誅殱厥渠魁固常理賣劒可牛刀可犢不忍農夫亦遭此將進酒君不見玉臺明月鏡朝朝拂拭生光輝上有雙飛金鵲影識我少年紅澤時山中小草無逺志流景歘忽如猋馳向來鬒髮似鴉羽此日春蠶吐白絲所以花前月下一壺酒古人痛飲無復疑澤農澤農結屋如雞栖舍中築塍為畛畦春來無地生青草况有菜茹供朝虀勸農使者出行水對此不忍加鞭箠田中生魚魚盡肥屋底瘦人扶不起先生閉門聽雨聲為爾惆悵傷余情君不見紇干山頭凍殺雀何不飛去生處樂庚辰四月草日赴謝氏館吳季良攜酒為别東里先生烏角巾薄遊吳中三十春聞言不如祁孔賓見道多慚程伯淳強聒自謂愚而神膠膠肫肫不可循故交零落參與辰獨有一人長若新鸒斯之黨何頻頻願逢新人如故人鳯凰山九山聯延何鬱蒼中有一山如鳯凰鳯凰不來名獨好逺勢似欲高飛翔梧桐有支竹有實玉水側出輸天漿飢食渴飲無不可何獨苦愛鳴朝陽澱山寺何年飛來湖上峯中有石穴藏蛟龍山僧留客共清夜竹爐怒吼松濤風忽疑坐我天竺下睂間秀色浮蔥蘢借爾摩尼如意珠聽師波羅談苦空與開心孔見真性隨方應現無不從夏日泛舟江邊青蘋風欲秋江上白雲如水流人間炎熱不可處駕言出遊寫我憂烏匼小巾一角墊黃葛短袂涼颼颼白鷗飛來復飛去卧聽橫竹商聲謳范叔豹苕溪草堂歌苕之水向東流君家草堂溪水頭一室小於溪上舟清風滿屋長如秋甑中生塵魚在釡終日哦詩搖兩股君不見杜陵草堂花滿川將軍立馬駐江干天吳紫鳳補短褐安用行庖洗玉盤良無廣厦千萬間乃欲天下寒士俱歡顏趙仲穆山水圖歌山有麓兮水有麋石礌礌兮彼漁之磯水有麋兮山有麓樹翳翳兮彼樵之谷波極目兮雙帆暮飛我懷伊人兮渺不知其所之采采蘭若兮充爾佩褘辨之陽苕之滸兮來吾與歸期戴彥季不至衆星熒熒不如月五金錚錚不如鐵剡溪公子來何遲鐵為靈金人不知君看針頭小於刺摩挲生澀無光輝大哉天地共消息子北午南分坎離雙松圖為程似道作雙松挺然徂徠之巔厯仌霜而不凋澤雨露而不妍爾植爾茂惟貞惟堅用以為君子壽如其年如其年畫鯉以為魚耶鱗甲已具以為龍耶頭角未露時至則化厥施斯溥蛻骨天淵蒼生霖雨黃南窗小像著烏匼之短帽曵碧綃之輕裾若丹丘之孤鶴骨既清而亦癯嗟爾童子抱琴焉如日月不可與留歸來兮樂吾初吳瑩之小像骨雖清而不枯貌雖豐而不腴有田與廬誦詩讀書恂恂乎美且都吳仲圭畫松以爾為楹其直不可以中繩以爾為梠其曲不可以中矩一丘一壑多厯年所白摧朽骨太隂雷雨吳景良農慶堂詩維揚禹疆厥壤維沃爾服爾耕貽我嘉榖翼翼冷風自南自東侯順侯嵗聿屢豐有稻有稌有􅓿有穱我庾既崇如山斯嶽先民是遺匪豫是能擫籥吹詩用薦厥聲厥聲洋洋式歌且詠錫慶自農疇敢弗敬寄吳季良蘭有馥兮芷有芳我懷伊人兮惟吳之良文武之道兮一弛一張力有所俟兮用有所藏機不可以豫謀兮變不可以豫量庶君子之明亮兮感余心兮倀倀故建昌州判嶽德敏哀辭眷碧山之幽栖兮駕吾舟以遄邁升其堂不見其人兮撫遺孤以增慨覽芳嵗其猶未艾兮何佳木之先瘁嗟浮生之翕忽兮若奔馬之厯塊舍昭晰之茂旦兮即永夕之昧昧三星奄其西沒兮孤參橫其誰待懷館穀於疇曩兮辰厯兹其三亥感余情之不能忘兮悼良會之莫再弔明月於中扃兮瀝觴酒以再拜雜椒蘭以為粻兮又薦之以芳茞招遊魂於鄂之渚兮莫蛟龍之為害狐首丘其亦已兮羌雖死而弗悔别夾谷知事可與我愛楊子江心百鍊鏡明於月冷於水揭之可以照天地我愛豐城土中三尺劒氣如雲質如銀佩之可以服鬼神尚不如蘭陵故人夾谷氏大雅愔愔古君子韜光自晦常有餘藏鋒不試終為美睂間有色清而溫玉佩瓊琚照秋水我有朱絃白雪知者希一曲遂為相識始堂堂歌君不見車如流水馬如龍大道長驅耳生風床頭黃金借顔色快意正在一日中又不見車如雞栖馬如狗側足旁趨面生垢投人不遇刺欲漫失意寧論百年後鳬脛自短鶴自長顚倒萬事未可量西來江水東流去白日竟是為誰忙且當開尊酌美酒起舞頓足歌堂堂與陳衆仲提舉吾聞泉南山水逺更竒三蘇不得專蛾睂天海雲風發胸臆波濤萬丈傾雄辭越從江漢下南紀却入箕尾乘東維十年依光日月角一官遂作文章師平生學問龜五總小叩大撞無不知東海書生雙井客思見君子瞻光儀君不聞龍泉干將自神物鐵花生澀埋塵黳寧無華山赤土為我發光彩一使變化凌空飛送張叔方湘潭州稅務大使使君足下逺遊履茇涉湘潭數千里江南柳色共依依親老家貧須祿仕昔年袴褶作巡官矢箙弓櫜懸豹尾于今九九學算術却執牙籌管州市炎洲蛋人卉為服西域賈胡珠作珥巴賨竒貨積如山賤者翠毛兼象齒千萬人中生俊傑識時所務非俗士與民儘用一分寬粗給官常斯可矣君家五世皆達官節槩兩朝無比擬况爾諸孫有祖風為國理財聊小試揚子江頭春雨深杯行未盡離歌起安得相從到楚鄉澧有蘭兮沅有芷竹雞語泥滑滑江頭路雨蕭蕭君莫去不辭路滑馬行遲恐君衣裳汙泥土贈相士王雲􅀈君不見秦時照膽鏡光輝團團似明月明月自缺還自圓此鏡一失三千年我疑神物猶在此飛入雲􅀈睂睫裏鏡不解語君能言天機到處妙不傳富貴功名顧盻間可使見者揮金泉題錢思復小像爾氣之充爾色之愈博襟長𥚑而拱而趨雍雍于于山澤之臞是所謂溫潤而栗者歟壺中一字至十字翁壺中無不容天地鴻濛其樂也融融一室燒丹竈紅見松下青衣羽童是何年竹枝化為龍碧桃花下無日不春風我欲訪山陰舊隱與參同僧溥雨􅀈贊充然其氣之濡也凝然其形之臞也繽繽乎其雨華也矻矻乎其􅀈居也遍滿六虛不離一區非有而有非無而無卓卓乎西方聖人之徒歟春晚書懷四聲體春晚翠閣朱户繡箔風起晝寂紅雨亂落歌枕夢熟啼鳥喚客流景電激今豈復昨尊酒對客浮以大白余有暇日聊與共樂阿剌吉阿剌吉酒之英清如井泉花白於寒露漿一酌嚨胡生刺芒再酌肝腎猶沃湯三酌顚倒相扶將身如瓠壺水中央天地日月為奔忙經宿不解大蒼黃阿剌吉何可當古尊彛歌為濮樂間作神物可使厭百祥左尊右彛相頡頏雲雷古篆為文章叨餮異獸頭角張丹砂空青金玉相星彩錯落半赤蒼摩挲猶作黃流香稽首再拜登斯堂手援北斗酌桂漿願君飲此壽而康千古既往萬古長于胥樂兮樂無央悲歌行七月龍火正西流卧看玉宇懸清秋三辰旋轉不得息萬事反覆良悠悠川原盡為虎豹穴風雨常隔鳳麟洲君不見愚夫憑河去不返寡妻遺妾怨箜􅔃海水竭海水竭海人熬波淚成血鹵花凝白雪不如高廩露積萬有餘征商不行榷法壞使者分司來趣賣農家食鹹苦不多鹽乎鹽乎奈爾何觀打春土牛送寒赤於火烏衣芒兒立牛左大府尊官五色鞭置酒高臺打春破女魃吾知旱有神神或汝矜民尚可里正夜走急如風明日長官來勸農採蓮女妾本鴛鴦湖上女家在鴛鴦湖上住去年湖上采蓮時將身嫁作商人婦商人今年行不歸荷花欲語嬌為誰間看鴛鴦拋翠菂顏色如花命如薏蓮有藕兮藕有絲郎君白面誰家兒水煙霏霏日催夕解后相逢莫相憶參沙神歌參沙之神鐵作身可以厭伏水怪降楓人去年漢鹽官地坼靈海垠龍魚憑怒不可馴潮汐奮決驚吾民南垣秉鈞吏飛書報天子有命恤民瘝竒謀遂蜂起君不見臨臯間剝山及骨赭以殷山氣靡靡去不還山木慘慘愁無顏吳船銜尾七百里共輸山石填海水沙虛岸隕勢莫支虎落長筊非久計愚公于今無子孫操蛇之神聵不聞徒知發鳩有鳥名精衛銜寃蓄憤口欲弊參沙神嗟爾有力贔屭如庚辰便當為我桎梏疏屬安朱垠海行故道從此始民情快樂天心喜大刻穹碑紀神美億萬斯年永無圮題蘧廬小像彼何人兮翩翩衣白苧兮純玄曵扶留之枯枝若將去而復旋虎挾乙以誰威龜藏六而自全合歸休乎吾土寄蘧廬以天年四時木犀歌山有木兮木有犀其花長秋何皚皚靈芝三秀書上瑞曾不及爾常芬菲初疑師文叩絃發清商無射應律變四時又疑女夷司花竊天和使爾枝格生嫵媚物生根撥真自異天情豈得為爾私蟾宮别種萬萬古不與草木同凋萎安得靈風鏘然駕鸞翼與爾上結青雲知升平曲濮樂間賞燈席上作歌升平爾田多稼我庾盈姑蘇臺邊燈作市攔街小兒拜參星冰蠶作繭大如甕火鼠摛毫白成雪鮫人試手織輕綃結束琉璃萬明月月中五色花滿圍交光相羅寶紋闕奴然炬夜不瞑吹霞弄日搖春暉華屋煌煌耀深逈龍腦浮香留藻井雲母屛開火樹花水精簾泛金波影主人置酒清若澠桃花扇底來嬌應朝廷有道與民樂製此一曲歌升平種花吟滿園種花不種桑野桑不入名花譜五陵豪家紈袴兒快樂豈知蠶績苦歡娛未足事已乖冨貴欺人年少去却攜鋤钁向桑間滿眼看花花不語君不見金谷荒涼梓澤空春風錦障俱塵土悔不當時學種桑盡遣歌姬作蠶婦贈陸松隱武陵劉郎花下歌商雒黃公橘中樂隱居豈必巢雲松要在披襟有丘壑肘後長懸不老方人間共愛長生藥白髮萬丈吾何憂可待流肪成琥珀感懷百年如舜華覽之不盈把胡為蝸角爭流血遍原野不聞楚王孫風雷生叱吒哀哉帳中歌美人雙泣下吟詩故不惡飲酒亦大雅得失可忘言富貴天所假彭存耕贊在昔先民受田以制嗟今之人私地之利操厥左劵而相付畀亘陌連阡無有窮己惟我良朋則異於是存之以心耕有餘地樹德揚休穀粟爾子豈無豐年不在藝芓紙扇銘彼雪之皎如此心之純如彼風之穆如此心之晏如彼紙屛風銘風之動屛以障之欲之縱禮以防之鏡銘心之明或蔽之鏡之昏或翳之去爾蔽發爾翳有輝光照萬世程祥甫南山篇南中有山何巑岏崛起自是佳林巒不同躁者與物競長得幽人推户看烏皮舊几歙石硯黃葛短衫湘竹冠此地煙霞足真賞他家圖畫空美觀尚憐䟤跋風塵下俯首局促為鹽官平生胸次故悠然取琴囊中時一彈松頭秀色近可挹窗宇六月生蒼寒便應許我分半榻永矢弗諼歌考槃辨山小隱吟録卷二
