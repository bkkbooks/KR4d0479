body:
  text: 弁山小隱吟録别集類四元提要臣等謹案弁山小隱吟録二卷元黄玠撰玠字伯成慈谿人流寓弁山故以名集其詩不為近體高者有元結遺意次者近乎白居易但不及二人之宏濶深厚耳中多勸戒之辭蓋亦剛方嫉俗者前有自序稱蔑有令徳不敢謂隱獨以所得於天者薄故將退藏以終其身又言文中之言稱願上之人正身修徳使時和嵗豐已受其賜尤粹然有徳之言勝矯語髙蹈者逺矣乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀弁山小隱吟錄原序黄氏之先宋祥符中自温之樂清徙明之慈溪闕先生以来世篤儒業曽大父臨川府君建節鄉部始来城居宦成而家益貧三子先大父最長至元丙子家燬於兵厥後子孫挈而西来叔氏依婦家於越其在鄉里守墳墓唯仲氏而已自余之西四十有餘載教授諸生以資共養髮種種且白来日其幾餘哉又如是不止行將焉歸蔑有令德不敢謂隱獨以所得於天者薄不能顯故將退藏以終其身霅水之陽弁山之下有丘岑蔚思構數楹以寄朝夕浮游江海間不能自還或靳之曰桑蠶作繭猶知纒褁其身子漫不為計空言何禆應之曰余游者也某水某丘游之寓也苟寓矣又何營之有秦望東南逺欲無依稀禹穴向姚虞幾時把酒鄞江上却對鄉山看此圗是余所題江山歸興圗詩也嘗求之則隱之意可見矣昔文中子志不願仕唯願上之人正身修德使時和歲豐已受其賜余雖不及古人苟獲所志泉后林壑之娛風雲月露之賞不必弁山也夫歸必有資既不能自資資於人而歸又余之所不能情發於中而形於言目之曰弁山小隱吟錄錄以畀吾兒私藏之於以紀吾游之寓而鄉土親戚之思亦可見也至正乙酉冬十二月甲子弁山隱民黄玠序
