body:
  text: 弁山小隠吟録卷一元黄玠撰古體五言擬古龍馬負靈圖八卦開人文天運當寅中民時方大昕制字乃未多所言為典墳一往數千載懐哉聖神君翳林無陽土暗谷多下泉登山履衆險險盡見杪顛人居物物中物物能蔽天將身出物表萬象始昭然一氣成嵗功孰為四分之遂使春木榮不知秋葉萎天道自有初物命亦有司任運得吾性無為無不為天髙九萬里疾若弩矢馳白日猶在下況爾衆物為翾羽刷俊彩強欲凌空飛去人苦不逺但使見者疑感懐積陰不可掃積懣不可道君子所可道小人以為嬲世事終渺茫物情慢衰老歸來日未昳自去庭中草仙人大還丹可用更凡胎舉世不謂然逝矣誰能哀萬事唯有醉奴子抱琴來十倍李供奉一飲三千杯矩步恒彳亍㨗走能千迴感彼元髪化聊復少銜杯陰草夏即苑陽花冬亦開天序自有定不是偶然來有酒可用醑無酒我當酤天運嵗益差人事日不如羽蟲何多言木葉已無數凄其衆草晚樂與佳菊遇物蠧豈有極造物難為工我將剔除之刺芒銛若鋒小枝食已盡大枝旋復空蟲多飽即死花落為枯叢盆中梅樹子為爾可憐生寒泥不五斗勿與大塊争移置池水頭照影池上冫和冫嚼花蘃天地無餘清娼鳥不可馴娼女不可親野性自難定豈知愛其身千金買少妾屬託在他人譬如道旁花竟是為誰春駑馬少良駒淑媛多令子大易重咸恒關雎明謹始橘樹生南州渡江即為枳地氣使之然如何論天理江左言風流王謝為稱首謐既坐姦回澹亦虧節守清談本廢事何物非芻狗不忍書義熈侃獨有佳後子雲投閣生緑珠墜樓死事主心弗移不若一婢子哀哀莽大夫千古穢青史草元數萬言焉用識竒字燔肉既不至孔子輒去魯醴酒復不設穆生亦辭楚古人道義交政在慎出處寥哉聖賢心夫豈餔啜故花開君勿折花謝君勿掃掃花傷花心折花畏花嫐但令尊有酒中懐得傾倒從花自開謝開好謝復好上客有馮驩故吏有任安二子久已死益見交道難軟語相媚恱顛倒若轉丸孰云是可忍怒髪為衝冠南州辮髪兒相從事觚槧陳遵好尺牘暇日聊口占悠悠歴嵗年寒暑若病痁道德負初心誰獨受鍼砭客有千金兒過我十尺舍狹隘不可留飛丸出彈射腰下雕玉螭粹好絶釁罅信美非所珍聊足以相詫朱絃有遺音琅然動清氾自喜若弗勝入耳何渢渢君子道吾常哤俗多雜儳但念賞人稀不知聽者厭白日何瞢瞢人中有梟獍酖毒不可懐猶將恣酣醟司命主督察雷公布天令慎爾恐自戕微我相詬病儒有席上珍把玩足無厭梅花雖苦寒其中自清贍冨貴如燎毛炙手方炎炎貪戀之謂何仰天一長欠昻然三尺松種之五斗盎俯身就嵌石毛髪如鬼狀雖蒙華屋居故性終木強誰當宣其鬱使彼得疎暢久客念還家還家復如客行李未及安期日相促迫勿匆問衣襟草草篋書册終嵗恒若斯幾何頭不白題吳季良東明軒朝日出暘谷照我軒東榮煌煌天光發湛湛旦氣清定志息喧雜澄心養虚靈八窻啓扄鑰萬象生光明賦顧梅西煑雪摇竹取殘雪松聲動寒吹金懐少餘歡石鼎作雅事極清超水品至淡出天味行過梅花西唤起幽人睡采蓮女川日出已髙江霏散如霧但聞采蓮曲不知采蓮處雙雙相思鳥飛上相思樹幽人空爾懐欲往畏多露寄胡伯衡兼呈叔父元理元美憶昔少年日慷慨賦逺遊晨起攬白須始知天地秋寒雲去鴈斷落木窮猿愁親故各異方誰當慰淹留此邦非吾土悵望登兹樓長歌動幽憤汗漫不可收陽鳥尚謀食候蟲猶念衣口體見驅迫使我逺别離厯厯路半千迢迢江兩涯悠悠去鄉邑往往見縶縻年衰酒況惡引飲不滿巵形影相嘅惜恐為時所悲弁山非故山愴然寄幽期餘生苟木隕猶及爾東歸題章德􅅷蘭竹樹何蘙薈蕙蘭自竒芬水墨冩清影猶疑見湘原欲持一巵酒酹此千嵗䰟但恐醉中意難與醒者言賦傅伯玉來青軒兩山送青來與人終日閒爽氣逼眉宇不似在塵間仰觀天中雲擾擾去不還始知静者佳取琴當戸彈南堂偶成似衞畊間先生倚闌看池水池水清若空煙沉樹色底日行雲影中翾羽晞薄霧游絲汎光風躍魚自幽潛豈望能為龍才劣不任官力弱不任農清世有華民我辰非不逄賦陸子敬舊時月色亭古月即已舊今月乃更新解后見顔色梅花如故人挽彼簷下枝掛我頭上巾摘花不挿髪踏月走千巡橫笛且勿吹良夜亦易晨恒恐明日至使我跡復陳願因白免公託根冫雪輪結子近瓊樓永與桂樹親月下獨酌似謝季初叔久兄弟風休露欲下雲過月如走一尊良夜初萬事中年後大白真仙人俗客匪其偶孤斟不成歡引影作三友我今笑問影頗亦解事否既能隨我身胡不開爾口傾杯月入懐停杯月在手此月豈真月不飲復何有寄衍上人索畫蘭薄言采蘭蘤蘭葉闕人逺僻處荒山原崇炫非素心澹泊性所存亦同桃李春不同桃李繁衆芳非不佳蕙􅊉尤楚楚亦荷雨露私如何在榛莽庶將展微勞攬置羣玉府時我方未遑臨風獨延佇漁子蕩兩槳來從湘水濵手抱青蘭枝言報山中春問我日日醉恐貽楚叟嗔獨醒不在酒舉手謝野人日出躋北林日入下西澨幽芳隔逺水水寒不可厲歸來看畵圖瀟洒美風製萬事何必真聊與爾同世遊幻住菴留贈月千江上人出郭動柔櫓春花始班班俯舷照清流正見衰病顔形影自相笑浮沉人兩間胡能即有定波蕩不得閒村雨農事殷溪晴客衣暖佳人同綵舟沿洄繞芳甸呉蠶近三眠魯桑連百畹相將采白蘋日與春俱晚既雨天復佳鳴鳥聲故故前溪春已深勸我脫布袴刺篙亂清漣艇子入浦溆我袴不用脫汝自顧汝婦維時桃始華野眺欣有睹沿洄度桑隰迤邐見榖土山虚龍出雲谷暖鳥鳴雨來耨良足勤力薄奈何汝謝長源為余言燕子事有感舊雌有衆雛新雌來殺之蒺藜刺中膓並死無一遺持筸逐娼鳥惡土汙人衣彼雄誠不才怨心當語誰祥覽令我懼伋壽令我思物態尚如是世情良足悲慎勿買良田慎勿買良田良田有豺虎豺虎不汝食官司推剥汝公廩多急輸里正遭箠楚肉盡即見骨家破無死所茹蔊何必辛茹荼何必苦傷哉浙水民困此一犁土與戴彦季張和倫游南山玲瓏洞放舟出清苕鳴㯭聲了牙厯厯覽勝絶行行入幽遐玲瓏洞穴古疑有仙人家清風石上起吹老良薑花與韓介石聞人梅磵遊黃龍洞龍君所幽潜嵌空若眢井投石風轉雷股栗怯深逈僮奴夸捷走嘯呼已絶頂升髙只自危聊復罷吾興次韻孫尤實言詩佳詩如飲泉一寒乃清真妙趣欲無我寧復有襲因學之三十年同光猶隙塵擾擾共髙下未足輕衆人多忤言可忘薄奉氣乃醇羲黃復何心適當天地春與梁邦彦對雪飲酒禁體五精闡嘉瑞一白徧林藪飄洒集衆妙㸃綴出羣有覆蔵失垢汙摧壓見節守嵗華乃爾清夜色不得黝僮奴掖醉歸跡足没已厚人生幾兩屐素髪一搔首移舟移舟發江夕逺浦入雙樹烓竈動煙火野宿在中露波月光鱗鱗川霏雜輕霧濯手亂繁星水禽忽飛去素菴旅次積雨斂溽氛光風開日華先生澹懐士結屋如蘭闍庭下昌歜根門前射千花闕香聞煑茶似海雲使君佳雲滿蓬萊常具五彩色溟涬一氣浮空濛萬川積合散自有時變化忽無跡念彼霖雨功宜使蛟龍得示男曾昔别甬上居薄遊吳中郡恥從俗子言恐失名家韻生兒似阿堆頗亦存軌訓常疑習氣遷思與學宫近當湖早行離離海氣分皛皛晨光發舟楫逺相呼川途正紆折翕目聊假寐涼飈動毛髪客路繞天涯人家在林樾題畫山水似盛子昭冉冉山上雲纍纍水中石梢梢林莽髙黯黯崖谷黒東岡特秀絶㧞地起千尺突兀衆峯間猶是太古色連山根挿江江碧石齒齒層顛髙出雲老樹下壓水巖扉俯深逈磴道陟紆委欲持一壺酒慰彼幽棲子前山如立矟後山如倚較逺近千萬山斗絶入牛角礬頭積磊砢石面鬭磽确是中無征徭民俗猶愿慤回峯危欲墮峭徑深可入縈紆度壁隖杳窕去井邑泉懸浄練明崖擁積鐵澀緬懐貞白君相從負雲笈題商山圖美宦少寧居良田多賦率曼膚白如瓠仍防汙鈇鑕所以商山翁深逃入堂宻蔽芾皆美樅不覩長安日揚揚大逄衣翦翦小第室門巷既荒寒器具猶古質渴即引井泉饑或餐木實微我異梟鸞從人自鳬乙平生紫芝曲久不屈此膝鬚眉各皓然一為天下出自贊并贈冩真陳伯玉有形本皆幻聊與影相從於兹未能忘更欲求其同我神夫豈逺故在阿堵中靈景合内外逍遥方未終張伯壽煑石窩清坐客主心兩忘清坐對荒寂吹火出青藜拾薪煑白石倚闌荷氣涼移床竹陰夕素髪共飄蕭風期似疇昔黃一峯莫莫齋莫莫重莫莫車輪生四角岐路滿天涯歸人已林壑若華能照夜蓂草知合朔物有秀而靈唯吾貴淳朴寒夜寥寥遥夜清霍霍流景急餘生若斷緒棼糺不可緝屋髙寒影孤窻虚雨聲集僮奴懶欲休獨背殘燈立稱大人壽大人心坦坦大人貎雍雍凡此故宜壽始是八十翁左雄多後福卓茂本寛中遂當享耄期妙顔若芙蓉曹繼善安雅齋山行常蹇蹇水行夷且宛輕舟逐流水晨色猶漫漶雅道樂安恬幽人有園館竹素紛委積軒楹颯閑逺微官厭卑渫餘日甘冗散衣食豈餘饒菅蔴與蒲􅀈生兒似江革辭氣尤愿欵清吟楷法書作字特遒婉嘅彼雲海禽毛羽何豐滿去去迷所休恒憂百年短聽劉希孟琴公子青藜客寄懐在兹琴歌吟雜操弄將老嗜益深愔愔古大雅如玉復如金下指舒以徐三歎有遺音虚堂初夜涼相為洗煩心小甕酒可得與君留月斟答韓廷玉問詩學詩自有律才流必經通詠歌成文章譬若水與風茫茫沃雲日衮衮吹魚龍觸激從所遇萬變何可同恬淡有餘韻竒崛難為工恒存言外意趣味斯無窮竹亭用本韻繞霤竹萬挺晝日起暝色允矣幽人貞懐哉君子德淡食度清朝微吟答佳夕遺我青琅玕報之雙水碧題韓介石所藏盛子昭畫隆隆大谷深挺挺嘉木秀崇岡拆陰壑懸水落長霤槎牙松顛迴側塞石角鬭來者豈阮生尚爾冠服舊清嘯滿空山髙人在危構胡不從之居分瓢飲雲竇章俊甫水心亭羽客惡塗􅂒鮫人樂水居亭子在中沚清漪㴠四除隔花聞好鳥俯䦨見游魚悠悠川上意雅詠時相娛與璉市巡檢楊德新觟䚦徒有角用鷙不如鶚麒麟豈無趾走險不如猎看君好眉宇蘭臺瑩而博子雲識竒字安能効巡捉盗律如牛毛民風日偷薄彎弓欲誰擬聊復動鳴􅈀煙踈榆柳村水深萑蒲澤代者久不來淹留竟何樂重來吳興有懐松雪齋采芳須得蘭斬堅須得檀懐哉古君子感此嵗欲單青山如韎韐逶􅆔起林巒文立早有正氣一何鬱盤盤雲來松雪春雲去松雪寒藻翰雖不絶門樾今稀殘尚思燈火夕舛譌見砭彈厚意何以報抱志空長嘆贈毉士葉古齋昔者帝軒轅駕言師赤松相教服水玉問道崆峒宫文字盡科斗故是開天功顧謂鬼臾區妙契將無同靈樞發奥㫖元氣春融融山川入攬挹草木臭味通懸壺隠東市愧爾賣藥翁上下數千載猶在一日中聽周子固琴周郎妙音解矑子光射人山水有雅曲徽音得其真神閒應接暇氣和節調匀魚鳥亦飛躍雲風忽輪囷令我不能去永懐願相親擬送張子長赴史館陳志稱穢史漢緒遂中絶不如誦杜詩忠槩何慣切我將操玉斧騰飛入明月斮彼白􅇠毫製為董狐筆送子萬里行聊用資作述大義或有乖慎爾寧勿勿邵復孺映雪齋邵子書有癖一寒四窻静舉手倒執經夜映雪色冷側睨生墨光天地無遺景希功厚積餘思與古人並俞子昭山月軒山月出未髙爛如大銀槃及其當天中小於冰一丸我將問鬱儀青冥風露寒逺近且莫解況爾闕與摶兹軒特可喜倚䦨終日看常疑猛虎嘯驚起女乘鸞大雪有懐北中親友南州三日雪墮地為堅氷念我骨肉親束書向幽并馬寒車折軸嵗晚不得寧仰觀浮雲馳緬焉寄深情雪壑海雲使君所自號也雲來雪壑陰雲去雪壑明未見雪壑面已聞雪壑名豈謂衆皆濁常使我獨清雲去雪壑明雲來雪壑陰不從雪壑游不知雪壑心家世本鐘鼎志願在山林農舍農舍如雞栖稚子煦簷隙陂田不作壟野水深及壁樹老夕照黃草枯寒煙白魚罛設處處民有食菜色題郭天錫雲山圖翹翹山有木翳翳林有谷雨氣作深雲新陰如膏沐夫豈無居人誅茅結溪屋幽栖不出户野塘春水緑張子英閑止齋築室依甘泉蘭若滿中沚采掇子為誰雜珮玉橤橤擬步即市門行行行且已西山有爽氣朝來眉睫裏塵土一振衣城郭清風起餘習久未忘篇帙故紛委方床十尺舍亦有烏皮儿彈琴碧雲合飲酒白日靡時時盍朋簪森然㑹羣理領悟不必多凡百苟今是潜也何人斯良猶慕之耳既醉旋復醒逍遥爾閑止聞人梅磵堊室堊室生白光方廣逾一丈真元不受采太素寧有象端居静衆念納氣入晃朗翛翛塵尾拂濟濟鶴羽氅髙燈石月懸濃熏暖雲上深雪擁梅花思致足寫倣璉市有雙桂廟里父老云嵇司徒女墮井死樹有靈怪人家喜慶歌樂之事必祭之如喜神云廟前雙桂樹柯葉恒蓊蓊不知何王世司徒嵇氏塜女郎井中死靈恠相嗊恐自謂得水仙誰當覺羣懵題李紫篔墨本竹枝鄭谷愛吟詩夜聞巖竹折至今石上影猶帶山中雪刻彫妙入神餘情寄乀丿永懷貞白君終身惟素節月食彼月有食之死魄無遺光至陰自肅肅豈曰敢亢陽天中有闇虚無乃俄相當奄忽就滅没見者為憐傷幾欲張威弧舉矢射天狼恐非聖人意佇立但徊徨贈禱旱彭生黄仲珍家僮也旱魃忍為虐祠龍拜靈星踉蹡作禹步符攝有依憑神官與鬼吏霍霍見使令雷從儿上起雲逐劒口生一雨滂若注多稼勃已興自彼元氣神惠答如響應題吕德常所蔵雲西雪山小景前岡嶄如削後巘旋若顧溪寒􅖣嵊晚雪没剡中路將無乘興人過彼幽棲處應待月華生却棹扁舟去水枕水枕欹獨眠涼波蕩柔㯭仰觀天宇髙黙黙心自語清雲不蔽日濁雲乃多雨造物本無為一氣異消聚華亭教諭張伯元歸錢塘惻惻重惻惻舟舵動行色嵗晚念尊親華亭有歸客琴清孤月白酒盡衆山碧樓閣倚髙寒江空㠶影側次韻曹教諭見寄涼風發秋夕落木振疎陰相思在咫尺兩契同一心徽弦不下指寧我有遺音梧桐生下澤幾時成鳯林蹀􅞃雙逺遊獨繞庭中樹與世欲並臧行行迷所遇有客吹洞簫如泣亦如訴花月滿良宵如何此虚度僮奴山中歸僮奴山中歸為言山上松昔日摇䑕尾于今如穉龍結根依崇阿秀色排霜風可待生茯苓持以壽吾翁石塘觀魚似謝伯昭伯禮嘈嘈冰戞川濊濊魚在罧潜逃欲無所漁罟來闖闖鱗鬐見蹙迫首尾相藉枕猨窮不擇木鹿死不擇音爾魚自有神胡不游廣深五仄體思衞立禮作我友衛伯子履道坦若砥瞪目視薄俗足不涉市里客至設雅飲屢屢不可已重爾意愛篤使我獨仰止夢寐若有覿寤歎隔逺水落月照屋梠睟面玉色起次韻章俊甫訓子前朝名宦孫承家以清白五繅玉有光百鍊金出色升堂奉慈親甘芳極娛適推歡及司氣兄弟仍翕翕平生子孫念況肯勤戒飭叔郎烱雙矑器量牛可食伯郎作大字日費三斗墨怒罵静不聞舉步埀軌則穊種必厚收譬彼農力穡通才識細務至理明大率洪罏萬石鐘重自銖兩積衆口所稱歎天心為忻懌每憐機巧徒何殊沐猴棘較智三十里百失希一得晤言籬下英留芳待秋夕晚節將益佳于公有陰德王官谷聽泉援琴俯寒泉琅然動幽聽寫彼石上流寄此山中興耵聹喧雜空潺湲清響應翻將羽衣曲更作龜兹詠與趙都事初心白日照素商朱草合秋朔參旗久未起舉頭見晨角南中有佳士風度甚髙邈願生雙羽翰旦莫徃數數與衍上人道原樹本連百圍蘿蔓絲成結迴川繚崇構欒櫨隠深樾湍駛泉響急徑險石色滑可容許詢輩清心共禪悅陳益之壺中仙翁不知年一壺懸太空晨朝出賣藥日夕入其中雖與市人處不與市人同時有采芝客來自蓬山宫琴士王彦輔八音各殊器可貴在絲屬弦歌皆雅調清廟特於穆斯人久已逝唱詠不可續似聞漢中葉猶傳鹿鳴曲舊譜今盡非虚聲以相逐琵琶馬上啼箜篌水中哭弛張異所宜弦髙哀響促庶子一洗之髙彈繼遺躅吳中湯孟實余聞之衍師道原同居七世矣能率正其家人庭無間言室無私藏諸舍少有不律輙晨起盛服至其寢門引咎自責必改而後止天子賜復以表孝義之門館閣名臣皆為詩歌美之余雖未見君子中心藏之矣遂為之詩所謂不必寄元也麋鹿尚羣聚鸞鳯自孤鶱請書湯氏事願使薄俗敦其人字君實其貌肅且温推孝達本始同居及諸孫聚食近千指何曾異一門弟兄盡亷士娣姒多淑媛室中無私藏堂上絶忤言賣藥隠東市共知齒德尊佳氣日充閭五雲鬱屯屯九天降雨露自葉將流根賜復以終世舉家蒙厚恩陳允齋樓居扁曰可以大樓髙百尺青紅半空起小樓二丈餘適事亦可以時節㑹親婣伏臘供祭祀左方治杼柚前列考圖史覽觀雲水寛玩悅風日美玲瓏豁四窻吾心正如此陶與權南園别業瓊田無惡土玉樹多好枝鼎角匿犀者自是名家兒應門有暇日頗作佳園池朝臨二王書暮吟三謝詩花邊迎小車竹下理殘碁賔至可命觴親在志無違陶氏子竹居幽居少隣並野竹遶舍生秀色染篇帙疎陰洒簷楹物亦有竒節人將埀令名須裁十二律吹作鳯凰鳴與韓仲實九日登涵山有懐韓伯清涼氣薄莫商時菊委多露兹辰足相娛舟楫旋且具往日豈復來新人已如故百年幾兩屐更踏㴠山去穿空上危級身髙鳥飛處江天入遐眺暝色起煙樹始昏見橫參嵗與秋俱暮君子殊未來役車在中路無雲而雪時在謝氏白日天無雲雪花明昒昕僮子走相詫箇箇瑶花文饑人尚糠覈寒士方緼黂豐年望先兆無乃為妖氛欲持一書札問彼𤣥精君中情自激切神聽逺不聞聞舊館人髙斯和之䘮弔其子德淵川谷掩靈氣門戸有䘮氛栖神託微息變滅歸無垠時過不再春日昃不再晨諸生尚華髪何況我與君昔者搴芳芷研席遺清芬輸心結分好無乃太悁勤嗷嗷霜下鴻猶知念同羣幾日弔遺孤哭酹青山墳浙江觀潮似介石兼呈陳守中朝看潮水生暮看潮水落大江日東流自繞青山郭長瀾駕歸風秋氣正蕭索萬雷鼓騰趠百鬼凌噴薄蛟龍窟宅移蓬梗共漂泊況爾鼃黽微碕岸所栖託浩蕩天地間一氣同槖籥吳兒踏浪遊自許平生樂送黄少監晉卿還金華惟我宗人兄早登南宫試當時太極賦可使紙價貴文章有餘勇一鼔作士氣旋收成均譽遂發蘭臺秘迎親來逺遊禄仕見初志懸車不及晚重是愛日意桓楹樹阡表彛鼎銘祭器哀榮兩無忝子道兹葢備昔往弗可追今歸復何亟江􅆏冠葢集潮水舟楫駛能無英瓊瑰持用答嘉遺回首望金華草樹亦増賁寄介石索寒菊時菊晚逾好金彩照微霜庶爾同嵗寒解后不得將寤寐忽有覿道人冠幘黄入夢還出夢顧影但空房天地生萬物淹速自其常甘苦亦隨化樂彼未渠央介石遺余翁鞵歌以為謝衰年足趺冷火缶不少離投我雙青鞵針跡匀且緻跫然試幽步蹈履必雅地出户復入門徘徊感嘉遺將非尚方舄飄飄有仙氣嵗晚動行色逺道隨所至南北岐路多邅回來不易庶將黄石書報君圮上意寄胡伯衡陽元外家兒衡也獨爾雅昔同丱角遊今各為老者蹉跎江海上䟤䟦風塵下餘生復幾時短髪不盈把久思比園廬猶將弄杯斝飢鴻逺相呼積雪徧中野弟瑋來奔父䘮寫憂四首弟從江東來沉痾僅能起慟哭我先人旅櫬在千里䘮期豈無數傭力方有俟人命終若倚吾衰復如此墮淚下承睫覽鏡拂鉛水昔者母教兒過於我嚴君至今清夜中夢想見勞勤深恩久未報白髪紛如耘揚名不及顯痛恨思遺訓孝養豈有足促促嵗月駛承歡順顔色萬一有不至靖言念前非良悔亦已遲更敢責後人聊使後人知去年被羣偷終嵗不得寧訖今覬小康大憂重相仍蒺藜不可據荼蓼不可茹兹事未易了興哀欲誰語奉呈乙十一叔父骯髒復骯髒零露霑草莽親癠當此時憤惋恒獨想孤喪寄旅櫬未知所歸往匪人神曷依闇室有靈響諸從與父同重我心鬱怏五茸阻長谷寒水白漭漭疾憂迫衰暮貧辛似疇曩夫豈無他人相依在宗黨過小長安已行上河舟初入小長安路逄市中兒相邀買羅紈羅紈非不佳此物生饑寒山中大布衣嵗晚聊獨完賦竹居春夏秋冬琴碁書畵好風從東來吹我石上竹取琴竹下彈希聲不成曲桃李正無言世人自相逐繁華此何時所貴君子獨殘碁久未收竹涼成小坐樵蘇冷不㸑所設惟𤓰蓏風吹碧雲動時有蒼雪墮焉知人間世赤日如焦火逺過幽人居支笻立良久竹影落秋波照面緑於酒俗士不必來屐齒蒼苔厚案頭二王書妙不數顔柳好畫不厭看奈此風淒洌翠禽雙飛來翻枝落殘雪竹間見石友嵗晚共貞節淡如君子交冷面炙不熱惜花花開顔色好花謝顔色衰顔色不可久惜花枝爾為不如惜樹木樹木多好枝君看新雨餘鬱鬱生華滋贈相士薛如鑑松檜角嶄若𤓰瓠腹果然貴者自有相畸人休怨天班超本燕頷馬周亦鳶肩苟非眼若電便應面如田我昔不自知憒憒三十年頭顱忽潦倒眉目徒清妍論心在擇術斯言心可鐫何疑子荀氏嘗作非相篇感興松栢非不凋其凋異常木故蘀猶未黄新荑生已緑先生貧亦甚饑吟撼空屋衰謝分所甘但使來者續壽張南石宣慰留侯自人傑功名聊復爾既見黄石公更從赤松子神仙好樓居逍遥逺塵滓囊中餐玉法于今幾刀匕碧桃三月花照影瑶池水阿母紫霞杯睟面紅光起西山青鳥使書來道蕃祉宜爾壽千春朱顔常韡韡題曹雲西桂根圖何人操玉斧夜半縁青冥斫去月中樹千秋傷我情無根亦云已有根當復生但笑吳剛者負此不義名寄陳守中刁刁霜下枝爕爕風中葉迢迢良夜深恍恍佳夢接雅懐東里君清心進𤣥業樓居似仙人逍遥逺囂雜天辰不可攀海水不可涉吾獨走塵間風雨書一篋手把昌陽根誰能便衰颯湘也幾日來看花引杯榼送禮絶學上人還下渚西遊五天竺東上三神山相去各幾許悠悠生死關我欲往從之㤀世良復難大道固無為此身要勿閒乾坤性吾德父母形我顔壯志方未酬努力更加餐落葉飛清霜長颷薄林樾青山頻夢歸夜半孤舟發寧無金錯刀呼酒與君别歘來語匆匆徑去心孑孑清溪今夜寒梅花滿篷雪相思曲未終凍琴絃欲折贈沈梅隱玉衡指幽朔山川方涸陰萬木盡刁脫一德悶天心孰令得氣先孤花耀陽林此意識者希謂易彈吾琴哭彦實叔祖恭惟曽祖君三子各才諝伯仲既蚤亡宗事叔是怗當時師道尊戸外列賔屨諸生盡顯庸夫子但環堵幾年充賦歸風雨西陵渡捷音久不聞乃今得哀訃驚怛五内傷苦淚墮如雨偭思童丱初侍母拜膝下今兹三十年吾亦喪吾母本支百世親不絶僅如縷慟哭復奚言哀哉繩祖武感事絺疵諌智伯范増說項羽豈不懐盡忠所事非其主明哲思保身見幾常逺去毋為守汙辱白骨怨黄土送胡伯衡歸慶元朝看江水平暮看江水傾江水朝暮流游子東西行與子同自出相依在飄零君歸逝不復我行乃睘睘上有白髪親下有黄吻嬰晨餐累百指日食幾無贏風霜所匽薄憂患況靡寧舊學旋廢遺豈足希世榮買田臨清流築室依近坰繞園蒔果蔬親戚有合并此樂何渠央此志終莫成勿為苦悲歌悲歌愴人情艱難望骨肉嵗月如奔星悠悠南去雲跂踵懐先塋感事堂堂美髯公神姿凜如昨多財竟何為本支遂交惡欲令弭紛争此心甚精白人其謂我何我思逃鬼責大人生日惟我文潔公起家二千石至今江左士猶能誦遺德及余父祖孫四世嗣宗嫡生為貧所驅束書常旅食近聞甬上州地有十畝宅庶幾蒔松菊晚節奉娛適大人心坦夷善行久已積眉壽定可期我辰在箕翼湖上醉歸似吳季良湖上天已秋城中汗如雨喧寂稍不同炎涼亦何遽始知物外遊㧞足風塵去髙臥南山阿不踏東華路吳友之得男醴泉非無源芝草非無根乃翁樹陰徳令子生髙門汝今為人父汝亦有父存汝能念汝父汝子復汝孫顧德玉萬竹軒日出塵未動清坐傍疎簾簾影帶深竹風漪摇四簷花時甘澹退寄懐在碁奩舉手屬有念食子乃久拈壁間椶毛拂窻下漆棐儿一塵飛不來竹色浄於水賔退日更長清風亦時至蘭亭脩禊辭硬黄臨蠒紙白日何促促秋燈動華屋所思浩無端開軒坐幽獨涼月出東楹琴聲隔深竹欲問彈者誰童子睡正熟江晚雪初集翠竹聲珊珊曉超當南榮飛舞萬玉鸞愛此不能去豈知雙袂寒欲招丹淵子寫作圖簇看趙初心坐中贈中上人一元敲冰作硯水題詩亦何急山僧亟欲去童子庭下立問訊前村梅猶帶雪花濕惜别空躊躇折贈不可及春寒長風西北來動盪不能寧塵沙亂白日草木變秋聲陽德久未舒繁霜況相仍苦寒衣裘薄酒且屢屢傾湖上似濮樂閒吳季良湖水碧於玉湖船深似屋銀罌供奉酒金縷新翻曲花濃春亦醉波浄雲可漉當為故人飲但畏白日速自怡齋晏晏秋日晶倚䦨魚樂時雲煙生逺思水木涵清暉田父肯見邀家兒可言詩如斯亦云足幽偏得自怡冩愁似胡伯亮陽元外家兒生世何酷似兩翁幸無虞二母俱已矣青雲難與期白日非可恃動止見覊束晨昬闕娛侍鳴雨清夜長野蔌剪畦翠苦語出肺肝屢飲成惡醉兀兀雞在棲惴惴狐涉水處身百不可在世一何累平生結髪妻疾勢方未止芝苓籠中物傾倒已屢試無寧作鰥夫兒女欲何恃哽咽不得言殘燭泫風淚題松石圖毫端水墨影紙上松石神老節委地盡怪態與時新冩物要有似開卷知其人月出月出寒木杪照我軒東榮悵然下玉琴彈作離鸞聲夜久強就枕孤燈如秋螢紙帳不自暖一片梅花冰昔者昔者瀛洲客侍宴宜春苑佳禽忽翾飛咫尺天顔近内人急傳呼畫師閻立本俯伏池水頭研吮弄丹粉仰視虞褚儕愧死氣欲盡有客有客過陽城親喪極哀毁乞貸蒙厚資辛苦葬薶已他日乃復來感激淚如水願為三年傭報君千古意爾行誠獨賢吾心寧忍此可從諸生列學詩作佳士何啻百倍功朝夕相礲砥一解終不通愧負自經死乃知大化中所同唯是理初氣各有殊振勵徒為耳至後書懐月色不自暖霜氣生寒芒臥内無美飾床頭但菰蔣誰家合歡帳四角懸香囊芙蓉隠綉褥文綺雙鴛鴦起坐獨寤歎迢迢深夜長梅花自清苦乃將慕姚黄梁邦彦王官谷見訪伯鸞不願仕叔度亦無官葛越製隠服竹皮裁小􅃣所求年榖成斯人獲苟安庶有一畝宫可以歌考槃蚤起理素髪良朋來合并拂床正書册整襟候門衡無忌酷似舅季方難為兄朝陽雙鳯凰文彩生光榮石門張氏園幾二百年事見語溪志南石先生既宣慰河東退而家居每與賔友觴詠其中聞之里父老公之曾祖君為郡太守而歸有指而詈之者閽人執以請命公曰彼安敢詈我與之酒且有以贈之責門者曰吾豈以貴勢凌人哉汝不待教令而拘繫之是揚吾惡名以為子孫累也逐而易之噫斯其所以嗣世益昌而此園之所以弗廢與八月薺麥生四月靡草死昌榮在一朝衰謝閱千䙫德人慎所積力善樹深棋寧不履貴盛終無憂患遺世人昧理道但愛金玉好忽焉如燎毛性命不自保我從石門遊乃有張氏園閱嵗已二百池舘似當年大宅行大宅何渠渠昔時良宴同當戸埀碧柳夾道種青桐層軒不見日髙臺還避風鴛鴦啑華沼鸚鵡語雕籠傷心玉壺缺過眼金谷空蘼蕪怨春緑舜華悲夕紅衰草臥僵石寒雨泣故叢人生意氣得惆悵難再逄留石門待内弟子經不至乘舟駕言邁長夜方曼曼蒼涼物華老趢趗年景換顧予逺適子庶與同舘粲近行乃未來久别良足歎飛鳥有遺音啁鳴念故鄉長風鎩羽翮回薄空翺翔顧我日衰邁樂子年富強飄零豈不逺死生貴勿忘舟中奉陪南石宣慰雙陸達人忘勢分握槊肯相娛相對兩新月華星匝四隅朽骨如有神歸馬念逺途食子久未下罰飲當滿觚送訓道村上人游淛東芒鞋徤如馬别我向江東已過雲門飯還聞雪竇鐘青山入幽遐碧海浮空濛揚㠶及彼岸更有􅆊王宫鑷白似胡伯亮夜半不能寐曉起鑷霜髭失手及無辜覽鏡還自悲兩目遂眵昬當復何法施寄言向賢兄老於去年時思歸不得徃零落將誰依悠悠浙江水忍此長乖離張如㯉東齋雨詩并似其子翔南邀客坐清晝兩酌遂終夕雙壺交屢退傾歡入中臆捋鬚見詩班舉手問酒白不有佳友朋何以慰孤寂洪主敬掃月軒明月不可掃客愁不可道親老家益貧長饑對萱草稽首玉蟾君立身苦不早庶爾藥長生使母顔色好梅花相見漢􅆏晚相思湘水春若非捐珮者定是解珠人根頭春已動枝面雪渾消稱是黄金屋㝷常貯阿嬌南枝已先暖北枝猶苦寒笛中吹不盡畫裏得相看故人不可見梅花如故人相思隔明月獨吟逄早春送婦喪歸弁山結髪念舊歡撫心常忽忽餘生復何求白日待西没藥裹三年病蓬顆千嵗骨兒女逺相送悲風繞行紼空閨鎻今雨不見舊時月豈不念東歸臨事有倉卒寄呈揭曼碩古人不可見即欲見今人蘭桂各異物臭味自相親峩峩白玉堂遥遥紫宫隣風雲集羣彦四海望光塵客星入牛斗劒氣横秋旻能無一日雅慰我暮江濵賞芍藥似衞立禮四月見紅藥若與春光遇兩人可對酌群芳此孤注微風不動塵餘熏散成霧談諧遂終夕聊用慰遲暮錢季山方寸地大田亘阡陌厚積多憂虞治生方寸地種德自有餘忠厚為畛畦學問乃菑畬書中有珍味子孫焉得愚多雨多雨問庚日推窻看卯雲積水連巨漲沉煙翳初昕荷鋤雖無力亦知農事勤髙居但坐嚼寧不愧盤飱聞蛩嘖嘖復嘖嘖候蟲催織作少婦對秋缸淚逐燈花落向來陌上桑根株盡漂泊綀衣恐不完尚敢望紈帛讀唐史汾陽國大臣堂堂負才器獨馬不衷甲氣壓天驕子鬼貌且藍色顧獨畏盧杞劉晏工理財國用得無乏凡皆屬士類吏獨抱成牒政要在養民其事故可法昔者馮瀛王始事沙陀君延縁入漢周常為將相臣每當革命日必有勸進文元載既伏誅胡椒八百斛錢圜以函方善走固無足不聞古宥巵既盈終必覆常聞阿犖山竊弄梨園部其中有馴象寧死終不舞遂與雷海青埀名照千古婁公有盛德與物澹無忤狄相才獨雄可用安國步我其舉所知不必知我舉沈德中蒼筠軒平生我知竹竹豈不知我澹然萬慮空竟日林下坐一一青珊瑚時時蒼雪墮翠羽何處來清夢忽驚破莊仲文梅花兠昔日梅花兠今作梅花莊儒有一畝宫滿屋梅花香珠樹動春色玉林浮夜光悠悠嵗月晚貿貿天雨霜平生無俗情結交多老蒼獨有林君復意思可相當東齋似沈德方德中日出東齋明扶桑弄朝暾皜皜曙色起湛湛夜氣存倦客雙逺遊蹀足來清門徘徊戀光影妙契可忘言邀月團團丹華樹香繞十二䦨徘徘不能去樂此清夜閒舉杯和月呑已覺非人間杯空酒更酌明月去却還沈玉泉芳逺堂休文有裔孫門樾千嵗陰盤根踞厚地芳澤逺且深雨露所沾溉日月有照臨彌久將益㮊連雲起森森雪隠山人詩為沈伯玉作朝雲適如車夕雲忽如馬變化方未窮詎是無心者卷舒自有宜膏澤自有時幽棲在林壑或者夢見之憶瑶山故人瑶山一為别悠悠三十年至今清夜夢猶在瑶山邊美人不可見世故來縈纒能無咫尺書慰此心悁悁訪南山沈彦之采金罌子塵襟心不怡駕言采藥去木顆摘金罌刺手不盈筥石齒滑行屐齧足畏側步山雨秋正深落葉沉已腐辛已嵗將遊江陰君山墮馬傷腕既乃扶病而往作是詩似陳希文上上黄君山瞰茲大江陲一展萬里觀悠然千古思正北仰岱嶽稍西望淮沂計彼俯視此小於水中坻朝來扶桑暾已掛弱木枝江盡即入海山行復何之我馬雖云跌我車猶可脂人世若轉丸適心苟相怡醫士馬德正此山中鄉里馬少游神仙葛稚川結廬此山中手披白雲篇藥草滿畦埒松枝為屋椽饑食夫容砂渴飲枸杞泉寧與塵事疎勿貽俗子憐借問此何山但笑終不言送錢若虚遊武當北方龜與蛇列舍應天星陰中有伏陽在地為水靈祠宫嵩嶽西髙露何亭亭析褫走萬里香火不得寧阿師亟欲去江柳猶未青贈子詩五言持用叩神扄寄呈虞伯生學士今代虞夫子自是瀛洲仙撫編誦竒文西顧心如懸我昔曾大父葢嘗治臨川手澤幸尚存桐宫幾百年前賢不自譽所望在後賢褒嘉作美語聲光同爛然寸心此區區去鴈春風前白雲不可寄但有白雲篇送醫僧有空海舉眼空四海大地豈無人爾佛慈憫故疾患纒其身槖有千金藥可回萬化春稽首耆婆尊永言濟斯民贈顧梅軒客來不問梅但問軒中人爾面冷如鐵爾心獨陽春冰霜太古操水月平生真亦在塵世間不染世間塵惠山紀遊跨馬北郭門㝷僧南朝寺青雲珠樹林碧草金沙地危徑縁磥砢寒泉冩蒼翠星埀析木光月墮方諸淚含暉白日閒動影清風起解瓢貯冷冽臨流浣塵滓九龍發靈淵下作梁溪水文采多清流波瀾有源委我本乘興來嵗事亦徂只汲此山中緑寄彼城居子用吳寅甫韻似吳子善浮雲見白日照映玉色春去去重留戀行行畏參辰狼子多野心蛾眉能妬人振袂臨清流誰與爾同塵白雲窻故人廬山來寄我山中雲山雲豈可寄寄此意殷勤平生錯料事所見異所聞開窻拆封題飛鳥白紛紛舉頭生慚愧稽首雲中君庶以自怡恱寧當混塵氛提携嵗月久掛向扶桑暾與爾從龍去化為五色文語溪夜泊語兒溪上柳日暮生春愁昔年侍阿母曾此繫行舟孝養苦不足生理非故丘臨風洒客淚付與水東流冷泉亭呼猿俯石瞰寒東飲之不盈升照影忽自笑相看面如冰摇摇松樹枝山猿呼欲應漸老筋骨疲愛爾解飛騰呈余峻山先生中朝彦早逄聖明君井絡降英氣奎光動星文束晢詩四言蔡邕書八分多士起瞻慕諸生賴濡薰鄙也少庸劣力學終無聞意謂經品題欲超凡馬羣師道吾豈敢屢染成緅纁厚德何以報寸心中沄沄呉興雜詠石林精舎在弁山之南參政葉夢得所作精舎青山曲石林雲氣寒夔龍方滿朝誰不愛王官歸人獨有見聊復此盤桓佑聖宫白玉蟾壁上留題仙人白玉蟾題詩留素壁筆勢来翩翩矆睒不可測將飛蛟龍影或是風雨跡何楷讀書堂一在何山寺昔賢讀書處今為梵王宫世事有翻覆人境誰能同唯應姓何氏與山相始終汙樽亭唐相李適之飲于此汙樽幾千載長在峴山碩何必有杯勺聊為飲一杯落葉墮西風奈此天地秋碧瀾堂碧瀾堂下水浪波何沄沄逺愧六客詞有感在斯文迴舟唱歌去弄影前溪雲白蘋亭唐刺史楊漢公所建城郭俯寒碧水木摇青華雙雙翡翠羽低拂白蘋花如何楊刺史不向此為家浮玉山在城南碧浪湖中渺渺碧浪湖中有浮玉山相期采蘭若佳人殊未閒舟楫忽已晚乗風聊獨還顔魯公祠恭惟顔太師名節天下無身首可異處貞心終不渝客来拜祠下豈愛干祿書墨妙亭在郡庠中東坡作記古来貴書蹟莫如淳化年千金購遺帖墨妙生姿妍誰其作亭子宋人蘓謫仙清風樓在郡小城上褰裳涉危樓倚檻對雄州山横太湖口溪出少城頭䦨干十二曲清風如涼秋碧巖在弁山頂擕酒上碧巖挈壺松下飲憑髙數千尺雲水白淰淰六月生夜寒山眠不成寢蜚英塔孤塔倚晴霄下瞰萬頃陂升髙欲望逺未至足已疲懷哉尚方舄䨇鳬正齊飛白鶴廟越俗好巫鬼白鶴乃有神廟享非一朝山木已千春客行亦少憩焉知偽與真黄龍洞在弁山之北旱日赤如火黄龍呼不應摇石動雲氣聴松作雨聲悵望但空歸何以慰深情顧渚茶因呉夫槩王得名夫槩名王渚西山紫筍茶水磑生緑塵小角裝金花盡從天使去供奉内人家栖賢里客來栖賢里願斸栖賢地秋來多晚菘脆美敵羣餼聊將遺子孫庶能知此味題髙晦叔牧松齋山中拾松子種作庭中樹亦有牧養恩異彼牛羊豎結構豈在多政為讀書故銅爐闕棐几蠒紙石硯具松影掃更合松聲吹不去坐此嵗月長當知茯苓處章榖仲蓮洲結屋水上居息影洲中地誠為愛蓮者當知楚蓮意涼風生緑香旭日吐紅媚向來無極圖玩索有深味次韻韓明善贈竺景淵先生已髙蹈翰墨有遺香學者走四方斯文茲濫觴景淵吾所親意思何深長純純不自衒餘子空陸梁我行日已邁嵗月墮渺茫向來絲竹音猶在孔子堂勉爾思益勤振翮髙飛翔弁山小隠吟録卷一
